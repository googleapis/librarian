name: Node.js
on: [push, pull_request, merge_group]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-24.04
    # TODO(https://github.com/googleapis/librarian/issues/4593):
    # gapic-generator-typescript installation takes over 4 minutes.
    # Improve installation speed and revert timeout to 5 minutes.
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Display Go version
        run: go version
      # Cache the Go build cache to speed up "go install ./cmd/librarian".
      # actions/setup-go caches module downloads, but not compiled objects.
      - uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-build-
      - uses: actions/setup-node@v6
        with:
          node-version: "18"
      - name: Display Node.js version
        run: node --version
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Display Python version
        run: python3 --version
      - uses: ./.github/actions/install-protoc
      - name: Install librarian
        run: go install ./cmd/librarian
      # Cache tools installed by "librarian install" (npm global packages
      # and pip packages). The cache busts when librarian.yaml changes,
      # since that file contains the pinned tool versions. On cache hit,
      # the install step is skipped entirely.
      - name: Get npm and pip cache paths
        id: tool-paths
        run: |
          echo "npm-prefix=$(npm config get prefix)" >> "$GITHUB_OUTPUT"
          echo "pip-prefix=$(python3 -m pip show pip 2>/dev/null | grep Location | cut -d' ' -f2 || python3 -c 'import site; print(site.getsitepackages()[0])')" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        id: tools-cache
        with:
          path: |
            ${{ steps.tool-paths.outputs.npm-prefix }}
            ${{ steps.tool-paths.outputs.pip-prefix }}
          key: nodejs-tools-${{ hashFiles('internal/librarian/nodejs/librarian.yaml') }}
      - name: Run librarian install
        if: steps.tools-cache.outputs.cache-hit != 'true'
        run: |
          cp internal/librarian/nodejs/librarian.yaml librarian.yaml
          librarian -v install
          rm librarian.yaml
      - name: Run internal/librarian/nodejs tests and check coverage
        run: go run ./tool/cmd/coverage ./internal/librarian/nodejs
