language: nodejs
tools:
  npm:
    - name: gapic-generator-typescript
      version: "561f7eef8b725359f650c22cce001b08d36811cd"
      package: "https://github.com/googleapis/google-cloud-node/archive/561f7eef8b725359f650c22cce001b08d36811cd.tar.gz"
      checksum: "1de85e60e02feb1fef7bd733398f0ed076c847ca86520a90a687142d26a787d2"
      build:
        - "npm install"
        # tsc only compiles TypeScript; the generator also needs templates/
        # and protos/ in build/ (resolved via __dirname at runtime).
        - "./node_modules/.bin/tsc"
        - "cp -r templates protos build/"
        - "npm link"
    - name: gapic-node-processing
      version: "0.1.8"
    - name: gapic-tools
      version: "1.0.5"
  pip:
    - name: synthtool
      version: "5aa438a342707842d11fbbb302c6277fbf9e4655"
      package: "gcp-synthtool@git+https://github.com/googleapis/synthtool@5aa438a342707842d11fbbb302c6277fbf9e4655"
