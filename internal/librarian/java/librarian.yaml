# TODO(https://github.com/googleapis/librarian/issues/5154): move this file to
# github.com/googleapis/google-cloud-java after the repository has migrated to
# librarian.
language: java
tools:
  maven:
    - name: protoc-gen-java_gapic
      local_path: sdk-platform-java/gapic-generator-java
      local_artifact: sdk-platform-java/gapic-generator-java/target/gapic-generator-java-{{Version}}.jar
      main_class: com.google.api.generator.Main
      packaging: JAR
    - name: google-java-format
      group_id: com.google.googlejavaformat
      artifact_id: google-java-format
      version: "1.25.2"
      classifier: all-deps
      packaging: JAR
    - name: protoc-gen-java_grpc
      group_id: io.grpc
      artifact_id: protoc-gen-grpc-java
      version: 1.76.3
      packaging: exe
      classifier: linux-x86_64
  pip:
    - name: synthtool
      local_path: sdk-platform-java/hermetic_build/library_generation
    - name: PyYAML
      version: "6.0.2"
    - name: jinja2
      version: "3.1.6"
