title: Create a resource with a oneof field
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test create one boolean field
      - command: auto field-oneof resources create $$resource$$ --location=$$location$$ --three
      - stderr: |
          Created resource [$$resource$$].
  - execute:
      - label: test create one string field
      - command: auto field-oneof resources create $$resource$$ --location=$$location$$ --one=one
      - stderr: |
          Created resource [$$resource$$].
  - execute:
      - label: test fail to create with both string and boolean fields are provided
      - command: auto field-oneof resources create $$resource$$ --location=$$location$$ --one=one --three
      - stderr: |
          ERROR: (gcloud.auto.field-oneof.resources.create) argument --one: At most one of --one | --three | --two can be specified.
          Usage: gcloud auto field-oneof resources create (RESOURCE : --location=LOCATION) [optional flags]
            optional flags may be  --help | --labels | --location | --one | --request-id |
                                   --three | --two | --validate-only

          For detailed information on this command and its flags, run:
            gcloud auto field-oneof resources create --help
      - error: '1: argument --one: At most one of --one | --three | --two can be specified.'
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test create one boolean field
      command: auto field-oneof resources create $$resource$$ --location=$$location$$ --three
      events:
        - api_call:
            expect_request:
              uri: https://fieldoneof.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
              method: POST
              headers: {}
              body:
                json:
                  three: true
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                one: mock_one
                three: false
                two: mock_two
                uid: mock_uid
                updateTime: mock_update_time
        - expect_stderr: |
            Created resource [$$resource$$].
        - expect_exit:
            code: 0
  - execute_command:
      label: test create one string field
      command: auto field-oneof resources create $$resource$$ --location=$$location$$ --one=one
      events:
        - api_call:
            expect_request:
              uri: https://fieldoneof.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
              method: POST
              headers: {}
              body:
                json:
                  one: one
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                one: mock_one
                three: false
                two: mock_two
                uid: mock_uid
                updateTime: mock_update_time
        - expect_stderr: |
            Created resource [$$resource$$].
        - expect_exit:
            code: 0
  - execute_command:
      label: test fail to create with both string and boolean fields are provided
      command: auto field-oneof resources create $$resource$$ --location=$$location$$ --one=one --three
      events:
        - expect_stderr: |
            ERROR: (gcloud.auto.field-oneof.resources.create) argument --one: At most one of --one | --three | --two can be specified.
            Usage: gcloud auto field-oneof resources create (RESOURCE : --location=LOCATION) [optional flags]
              optional flags may be  --help | --labels | --location | --one | --request-id |
                                     --three | --two | --validate-only

            For detailed information on this command and its flags, run:
              gcloud auto field-oneof resources create --help
        - expect_exit:
            code: 1
            message: |-
              argument --one: At most one of --one | --three | --two can be specified.
