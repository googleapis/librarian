title: Create a resource with different types of fields
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test create without required fields fails
  - command: auto field-attributes resources create $$resource$$ --location=$$location$$
  - stderr: |
      ERROR: (gcloud.auto.field-attributes.resources.create) argument --required-field: Must be specified.
      Usage: gcloud auto field-attributes resources create (RESOURCE : --location=LOCATION) --required-field=REQUIRED_FIELD [optional flags]
        optional flags may be  --help | --immutable-field | --labels | --location |
                               --request-id | --validate-only

      For detailed information on this command and its flags, run:
        gcloud auto field-attributes resources create --help
  - error: '1: argument --required-field: Must be specified.'
- execute:
  - label: test create with only required fields
  - command: auto field-attributes resources create $$resource$$ --location=$$location$$
      --required-field=my-required-field
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create with immutable and internal fields
  - command: auto field-attributes resources create $$resource$$ --location=$$location$$
      --required-field=my-required-field --immutable-field=my-immutable-field --internal-field=my-internal-field
      --labels=foo=bar
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create with query params fields
  - command: auto field-attributes resources create $$resource$$ --location=$$location$$
      --required-field=my-required-field --validate-only --request-id=my-id
  - stderr: |
      Created resource [$$resource$$].
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test create without required fields fails
    command: auto field-attributes resources create $$resource$$ --location=$$location$$
    events:
    - expect_stderr: |
        ERROR: (gcloud.auto.field-attributes.resources.create) argument --required-field: Must be specified.
        Usage: gcloud auto field-attributes resources create (RESOURCE : --location=LOCATION) --required-field=REQUIRED_FIELD [optional flags]
          optional flags may be  --help | --immutable-field | --labels | --location |
                                 --request-id | --validate-only

        For detailed information on this command and its flags, run:
          gcloud auto field-attributes resources create --help
    - expect_exit:
        code: 1
        message: 'argument --required-field: Must be specified.'
- execute_command:
    label: test create with only required fields
    command: auto field-attributes resources create $$resource$$ --location=$$location$$
      --required-field=my-required-field
    events:
    - api_call:
        expect_request:
          uri: https://fieldattributes.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              requiredField: my-required-field
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            immutableField: mock_immutable_field
            internalField: mock_internal_field
            name: mock_name
            outputOnlyField: mock_output_only_field
            requiredField: mock_required_field
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0

- execute_command:
    label: test create with immutable and internal fields
    command: auto field-attributes resources create $$resource$$ --location=$$location$$
      --required-field=my-required-field --immutable-field=my-immutable-field --internal-field=my-internal-field
      --labels=foo=bar
    events:
    - api_call:
        expect_request:
          uri: https://fieldattributes.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              immutableField: my-immutable-field
              internalField: my-internal-field
              requiredField: my-required-field
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            immutableField: mock_immutable_field
            internalField: mock_internal_field
            name: mock_name
            outputOnlyField: mock_output_only_field
            requiredField: mock_required_field
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0

- execute_command:
    label: test create with query params fields
    command: auto field-attributes resources create $$resource$$ --location=$$location$$
      --required-field=my-required-field --validate-only --request-id=my-id
    events:
    - api_call:
        expect_request:
          uri: https://fieldattributes.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&requestId=my-id&resourceId=$$resource$$&validateOnly=True
          method: POST
          headers: {}
          body:
            json:
              requiredField: my-required-field
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            immutableField: mock_immutable_field
            internalField: mock_internal_field
            name: mock_name
            outputOnlyField: mock_output_only_field
            requiredField: mock_required_field
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0
