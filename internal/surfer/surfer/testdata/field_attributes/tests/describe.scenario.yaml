title: Describe a resource with different field attributes
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test describe does not require any flags
      - command: auto field-attributes resources describe $$resource$$ --location=$$location$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          immutableField: mock_immutable_field
          internalField: mock_internal_field
          name: mock_name
          outputOnlyField: mock_output_only_field
          requiredField: mock_required_field
          uid: mock_uid
          updateTime: mock_update_time
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test describe does not require any flags
      command: auto field-attributes resources describe $$resource$$ --location=$$location$$
      events:
        - api_call:
            expect_request:
              uri: https://fieldattributes.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                immutableField: mock_immutable_field
                internalField: mock_internal_field
                name: mock_name
                outputOnlyField: mock_output_only_field
                requiredField: mock_required_field
                uid: mock_uid
                updateTime: mock_update_time
        - expect_stdout: |
            createTime: mock_create_time
            etag: mock_etag
            immutableField: mock_immutable_field
            internalField: mock_internal_field
            name: mock_name
            outputOnlyField: mock_output_only_field
            requiredField: mock_required_field
            uid: mock_uid
            updateTime: mock_update_time
        - expect_exit:
            code: 0
