title: Update a resource with different field attributes
release_tracks: [GA]
# yamllint disable rule:trailing-spaces
# (error messages currently contain trailing spaces)
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test update nothing succeeds
  - command: auto field-attributes resources update $$resource$$ --location=$$location$$
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      immutableField: mock_immutable_field
      internalField: mock_internal_field
      name: mock_name
      outputOnlyField: mock_output_only_field
      requiredField: mock_required_field
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test update required field
  - command: auto field-attributes resources update $$resource$$ --location=$$location$$
      --required-field=new-required-field
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      immutableField: mock_immutable_field
      internalField: mock_internal_field
      name: mock_name
      outputOnlyField: mock_output_only_field
      requiredField: mock_required_field
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test update all fields and query params
  - command: auto field-attributes resources update $$resource$$ --location=$$location$$
      --required-field=new-required-field --internal-field=new-internal-field --labels=foo=bar
      --validate-only --request-id=my-id
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      immutableField: mock_immutable_field
      internalField: mock_internal_field
      name: mock_name
      outputOnlyField: mock_output_only_field
      requiredField: mock_required_field
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test update immutable field fails
  - command: auto field-attributes resources update $$resource$$ --location=$$location$$
      --immutable-field=new-immutable-field
  - stderr: |
      ERROR: (gcloud.auto.field-attributes.resources.update) unrecognized arguments: --immutable-field=new-immutable-field 

      To search the help text of gcloud commands, run:
        gcloud help -- SEARCH_TERMS
  - error: |-
      1: unrecognized arguments: --immutable-field=new-immutable-field 

      To search the help text of gcloud commands, run:
        gcloud help -- SEARCH_TERMS
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test update nothing succeeds
    command: auto field-attributes resources update $$resource$$ --location=$$location$$
    events:
    - api_call:
        expect_request:
          uri: https://fieldattributes.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            immutableField: mock_immutable_field
            internalField: mock_internal_field
            name: mock_name
            outputOnlyField: mock_output_only_field
            requiredField: mock_required_field
            uid: mock_uid
            updateTime: mock_update_time
    - api_call:
        expect_request:
          uri: https://fieldattributes.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json&updateMask=%2A
          method: PATCH
          headers: {}
          body:
            json:
              createTime: mock_create_time
              etag: mock_etag
              immutableField: mock_immutable_field
              internalField: mock_internal_field
              name: mock_name
              outputOnlyField: mock_output_only_field
              requiredField: mock_required_field
              uid: mock_uid
              updateTime: mock_update_time
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            immutableField: mock_immutable_field
            internalField: mock_internal_field
            name: mock_name
            outputOnlyField: mock_output_only_field
            requiredField: mock_required_field
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Updated resource [$$resource$$].
    - expect_stdout: |
        createTime: mock_create_time
        etag: mock_etag
        immutableField: mock_immutable_field
        internalField: mock_internal_field
        name: mock_name
        outputOnlyField: mock_output_only_field
        requiredField: mock_required_field
        uid: mock_uid
        updateTime: mock_update_time
    - expect_exit:
        code: 0
