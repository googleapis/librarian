service ResourceNonStandard {
  // Retrieve a single resource.
  rpc GetLocation(.resource_non_standard.v1.GetLocationRequest)
      returns (.resource_non_standard.v1.Location) {
    option (.google.api.http) = {
      get: "/v1/{name=projects/*/locations/*}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/Location"
    };
    option (.google.api.method_signature) = "name";
  }

  // Retrieve a single resource.
  rpc GetApi(.resource_non_standard.v1.GetApiRequest)
      returns (.resource_non_standard.v1.Api) {
    option (.google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/apis/*}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/Api"
    };
    option (.google.api.method_signature) = "name";
  }

  // Retrieve a collection of resources.
  rpc ListApiResources(.resource_non_standard.v1.ListApiResourcesRequest)
      returns (.resource_non_standard.v1.ListApiResourcesResponse) {
    option (.google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*/apis/*}/resources"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/ApiResource"
    };
    option (.google.api.method_signature) = "parent";
  }

  // Retrieve a single resource.
  rpc GetApiResource(.resource_non_standard.v1.GetApiResourceRequest)
      returns (.resource_non_standard.v1.ApiResource) {
    option (.google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/apis/*/resources/*}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/ApiResource"
    };
    option (.google.api.method_signature) = "name";
  }

  // Create a new resource.
  rpc CreateApiResource(.resource_non_standard.v1.CreateApiResourceRequest)
      returns (.resource_non_standard.v1.ApiResource) {
    option (.google.api.http) = {
      post: "/v1/{parent=projects/*/locations/*/apis/*}/resources",
      body: "api_resource"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/ApiResource"
    };
    option (.google.api.method_signature) =
        "parent,api_resource,api_resource_id";
  }

  // Update a single resource.
  rpc UpdateApiResource(.resource_non_standard.v1.UpdateApiResourceRequest)
      returns (.resource_non_standard.v1.ApiResource) {
    option (.google.api.http) = {
      patch: "/v1/{api_resource.name=projects/*/locations/*/apis/*/resources/*}",
      body: "api_resource"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/ApiResource"
    };
    option (.google.api.method_signature) = "api_resource,update_mask";
  }

  // Delete a single resource.
  rpc DeleteApiResource(.resource_non_standard.v1.DeleteApiResourceRequest)
      returns (.google.protobuf.Empty) {
    option (.google.api.http) = {
      delete: "/v1/{name=projects/*/locations/*/apis/*/resources/*}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/ApiResource"
    };
    option (.google.api.method_signature) = "name";
  }

  // Retrieve a single resource.
  rpc GetApiLongResource(.resource_non_standard.v1.GetApiLongResourceRequest)
      returns (.resource_non_standard.v1.ApiLongResource) {
    option (.google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/apis/*/longResources/*}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/ApiLongResource"
    };
    option (.google.api.method_signature) = "name";
