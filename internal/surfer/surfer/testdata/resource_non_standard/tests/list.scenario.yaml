title: Delete a non-standard resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test list non-standard resource with flags
  - command: auto resource-non-standard apis resources list --api=$$api$$ --location=$$location$$
      --api=$$api$$ --limit=1
