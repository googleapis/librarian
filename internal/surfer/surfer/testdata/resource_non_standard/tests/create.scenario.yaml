title: Create a non-standard resource
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test create non-standard resource with flags
      - command: auto resource-non-standard apis resources create $$resource$$ --location=$$location$$ --api=$$api$$
      - stderr: |
          Created resource [$$resource$$].
  - execute:
      - label: test create non-standard resource with full uri
      - command: auto resource-non-standard apis resources create projects/my-other-project/locations/$$location$$/apis/$$api$$/resources/$$resource$$
      - stderr: |
          Created resource [$$resource$$].
  - execute:
      - label: test create non-standard resource with all flags
      - command: auto resource-non-standard apis resources create $$resource$$ --location=$$location$$ --api=$$api$$ --labels=foo=bar
      - stderr: |
          Created resource [$$resource$$].
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: api
      value: my-api
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test create non-standard resource with flags
      command: auto resource-non-standard apis resources create $$resource$$ --location=$$location$$ --api=$$api$$
      events:
        - api_call:
            expect_request:
              uri: https://resourcenonstandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/apis/$$api$$/resources?alt=json&apiResourceId=$$resource$$
              method: POST
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                updateTime: mock_update_time
        - expect_stderr: |
            Created resource [$$resource$$].
        - expect_exit:
            code: 0
  - execute_command:
      label: test create non-standard resource with full uri
      command: auto resource-non-standard apis resources create projects/my-other-project/locations/$$location$$/apis/$$api$$/resources/$$resource$$
      events:
        - api_call:
            expect_request:
              uri: https://resourcenonstandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-other-project/locations/$$location$$/apis/$$api$$/resources?alt=json&apiResourceId=$$resource$$
              method: POST
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                updateTime: mock_update_time
        - expect_stderr: |
            Created resource [$$resource$$].
        - expect_exit:
            code: 0
  - execute_command:
      label: test create non-standard resource with all flags
      command: auto resource-non-standard apis resources create $$resource$$ --location=$$location$$ --api=$$api$$ --labels=foo=bar
      events:
        - api_call:
            expect_request:
              uri: https://resourcenonstandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/apis/$$api$$/resources?alt=json&apiResourceId=$$resource$$
              method: POST
              headers: {}
              body:
                json:
                  labels:
                    foo: bar
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                updateTime: mock_update_time
        - expect_stderr: |
            Created resource [$$resource$$].
        - expect_exit:
            code: 0
