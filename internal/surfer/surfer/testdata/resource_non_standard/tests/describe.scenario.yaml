title: Describe a non-standard resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test describe non-standard parent with flags
  - command: auto resource-non-standard apis describe $$api$$ --location=$$location$$
  - stdout: |
      name: mock_name
- execute:
  - label: test describe non-standard child with flags
  - command: auto resource-non-standard apis resources describe $$resource$$ --location=$$location$$
      --api=$$api$$
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      updateTime: mock_update_time
- execute:
  - label: test describe non-standard resource with full uri
  - command: auto resource-non-standard apis resources describe projects/my-other-project/locations/$$location$$/apis/$$api$$/resources/$$resource$$
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      updateTime: mock_update_time
- execute:
  - label: test describe standard resource with full uri
  - command: auto resource-non-standard locations describe projects/my-other-project/locations/$$location$$
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      updateTime: mock_update_time
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: api
    value: my-api
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test describe non-standard parent with flags
    command: auto resource-non-standard apis describe $$api$$ --location=$$location$$
    events:
    - api_call:
        expect_request:
          uri: https://resourcenonstandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/apis/$$api$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            name: mock_name
    - expect_stdout: |
        name: mock_name
    - expect_exit:
        code: 0

- execute_command:
