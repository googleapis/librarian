title: Delete a non-standard resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test delete non-standard resource with flags
  - command: auto resource-non-standard apis resources delete $$resource$$ --location=$$location$$
      --api=$$api$$
  - prompt:
    - message: You are about to delete resource [$$resource$$]
    - input: y
  - stderr: |
      Deleted resource [$$resource$$].
- execute:
  - label: test delete non-standard resource with full uri
  - command: auto resource-non-standard apis resources delete projects/my-other-project/locations/$$location$$/apis/$$api$$/resources/$$resource$$
  - prompt:
    - message: You are about to delete resource [$$resource$$]
    - input: y
  - stderr: |
      Deleted resource [$$resource$$].
