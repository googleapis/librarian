title: Create a non-standard resource
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test update non-standard resource with flags
      - command: auto resource-non-standard apis resources update $$resource$$ --location=$$location$$ --api=$$api$$
      - stderr: |
          Updated resource [$$resource$$].
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          updateTime: mock_update_time
  - execute:
      - label: test update non-standard resource with full uri
      - command: auto resource-non-standard apis resources update projects/my-project/locations/$$location$$/apis/$$api$$/resources/$$resource$$
      - stderr: |
          Updated resource [$$resource$$].
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          updateTime: mock_update_time
  - execute:
      - label: test update non-standard resource with all flags
      - command: auto resource-non-standard apis resources update $$resource$$ --location=$$location$$ --api=$$api$$ --labels=foo=bar
      - stderr: |
          Updated resource [$$resource$$].
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          updateTime: mock_update_time
