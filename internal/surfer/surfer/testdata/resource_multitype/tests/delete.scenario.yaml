title: Delete a multitype resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test delete shorthand with property fallthrough
  - command: auto resource-multitype resources delete $$resource$$ --location=$$location$$
  - stderr: |
      Parsed [resource] resource: projects/my-project/locations/$$location$$/resources/$$resource$$
  - prompt:
    - message: You are about to delete resource [$$resource$$]
    - input: y
  - stderr: |
      Delete request issued for: [$$resource$$]
      Deleted resource [$$resource$$].
