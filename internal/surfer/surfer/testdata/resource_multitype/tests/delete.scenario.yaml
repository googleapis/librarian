        Parsed [resource] resource: projects/my-project/locations/$$location$$/resources/$$resource$$
    - expect_prompt_continue:
        message: You are about to delete resource [$$resource$$]
        user_input: y
    - api_call:
        expect_request:
          uri: https://resourcemultitype.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: DELETE
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            done: true
            name: projects/my-project/locations/$$location$$/operations/mock_operation
    - expect_stderr: |
        Delete request issued for: [$$resource$$]
        Deleted resource [$$resource$$].
    - expect_exit:
        code: 0
