actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test delete shorthand with property fallthrough
    command: auto resource-multitype resources delete $$resource$$ --location=$$location$$
    events:
