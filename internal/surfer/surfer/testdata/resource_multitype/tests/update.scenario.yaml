title: Update a multitype resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test update shorthand with property fallthrough
  - command: auto resource-multitype resources update $$resource$$ --location=$$location$$
      --labels=foo=bar
  - stderr: |
      Parsed [resource] resource: projects/my-project/locations/$$location$$/resources/$$resource$$
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test update shorthand with non-standard parent
  - command: auto resource-multitype resources update $$resource$$ --nested=nested
      --labels=foo=bar
  - stderr: |
      Parsed [resource] resource: projects/my-project/nesteds/nested/resources/$$resource$$
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test update shorthand with organization parent
  - command: auto resource-multitype resources update $$resource$$ --location=$$location$$
      --labels=foo=bar --folder=my-folder
  - stderr: |
      Parsed [resource] resource: folders/my-folder/locations/$$location$$/resources/$$resource$$
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test update shorthand with folder parent
  - command: auto resource-multitype resources update $$resource$$ --location=$$location$$
      --labels=foo=bar --organization=my-org
  - stderr: |
      Parsed [resource] resource: organizations/my-org/locations/$$location$$/resources/$$resource$$
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test update with full uri project
  - command: auto resource-multitype resources update projects/my-other-project/locations/$$location$$/resources/$$resource$$
      --labels=foo=bar
  - stderr: |
      Parsed [resource] resource: projects/my-other-project/locations/$$location$$/resources/$$resource$$
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test update with full uri organization
  - command: auto resource-multitype resources update organizations/my-other-org/locations/$$location$$/resources/$$resource$$
      --labels=foo=bar
  - stderr: |
      Parsed [resource] resource: organizations/my-other-org/locations/$$location$$/resources/$$resource$$
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test update shorthand with property fallthrough
    command: auto resource-multitype resources update $$resource$$ --location=$$location$$
      --labels=foo=bar
    events:
    - expect_stderr: |
        Parsed [resource] resource: projects/my-project/locations/$$location$$/resources/$$resource$$
    - api_call:
        expect_request:
          uri: https://resourcemultitype.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - api_call:
        expect_request:
          uri: https://resourcemultitype.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json&updateMask=%2A
          method: PATCH
          headers: {}
          body:
            json:
              createTime: mock_create_time
              etag: mock_etag
              labels:
                foo: bar
              name: mock_name
              uid: mock_uid
              updateTime: mock_update_time
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Updated resource [$$resource$$].
    - expect_stdout: |
        createTime: mock_create_time
        etag: mock_etag
        name: mock_name
        uid: mock_uid
        updateTime: mock_update_time
    - expect_exit:
        code: 0

