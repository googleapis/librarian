title: Create a multitype resource
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test create shorthand with property fallthrough
      - command: auto resource-multitype resources create $$resource$$ --location=$$location$$ --labels=foo=bar
      - stderr: |
          Parsed [resource] resource: projects/my-project/locations/$$location$$/resources/$$resource$$
      - stderr: |
          Created resource [$$resource$$].
  - execute:
      - label: test create shorthand with non-standard parent
      - command: auto resource-multitype resources create $$resource$$ --nested=nested
      - stderr: |
          Parsed [resource] resource: projects/my-project/nesteds/nested/resources/$$resource$$
      - stderr: |
          Created resource [$$resource$$].
  - execute:
      - label: test create shorthand with organization parent
      - command: auto resource-multitype resources create $$resource$$ --location=$$location$$ --folder=my-folder
      - stderr: |
          Parsed [resource] resource: folders/my-folder/locations/$$location$$/resources/$$resource$$
      - stderr: |
          Created resource [$$resource$$].
  - execute:
      - label: test create shorthand with folder parent
      - command: auto resource-multitype resources create $$resource$$ --location=$$location$$ --folder=my-folder
      - stderr: |
          Parsed [resource] resource: folders/my-folder/locations/$$location$$/resources/$$resource$$
      - stderr: |
          Created resource [$$resource$$].
  - execute:
      - label: test create with full uri project
      - command: auto resource-multitype resources create projects/my-other-project/locations/$$location$$/resources/$$resource$$
      - stderr: |
          Parsed [resource] resource: projects/my-other-project/locations/$$location$$/resources/$$resource$$
      - stderr: |
          Created resource [$$resource$$].
  - execute:
      - label: test create with full uri organization
      - command: auto resource-multitype resources create organizations/my-other-org/locations/$$location$$/resources/$$resource$$
      - stderr: |
          Parsed [resource] resource: organizations/my-other-org/locations/$$location$$/resources/$$resource$$
      - stderr: |
          Created resource [$$resource$$].
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test create shorthand with property fallthrough
      command: auto resource-multitype resources create $$resource$$ --location=$$location$$ --labels=foo=bar
      events:
        - expect_stderr: |
            Parsed [resource] resource: projects/my-project/locations/$$location$$/resources/$$resource$$
        - api_call:
            expect_request:
              uri: https://resourcemultitype.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
              method: POST
              headers: {}
              body:
                json:
                  labels:
                    foo: bar
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                uid: mock_uid
                updateTime: mock_update_time
        - expect_stderr: |
            Created resource [$$resource$$].
        - expect_exit:
            code: 0
  - execute_command:
      label: test create shorthand with non-standard parent
