title: Describe a multitype resource
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test describe shorthand with property fallthrough
      - command: auto resource-multitype resources describe $$resource$$ --location=$$location$$
      - stderr: |
          Parsed [resource] resource: projects/my-project/locations/$$location$$/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test describe shorthand with non-standard parent
      - command: auto resource-multitype resources describe $$resource$$ --nested=nested
      - stderr: |
          Parsed [resource] resource: projects/my-project/nesteds/nested/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test describe shorthand with organization parent
      - command: auto resource-multitype resources describe $$resource$$ --location=$$location$$ --folder=my-folder
      - stderr: |
          Parsed [resource] resource: folders/my-folder/locations/$$location$$/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test describe shorthand with folder parent
      - command: auto resource-multitype resources describe $$resource$$ --location=$$location$$ --organization=my-org
      - stderr: |
          Parsed [resource] resource: organizations/my-org/locations/$$location$$/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test describe with full uri project
      - command: auto resource-multitype resources describe projects/my-other-project/locations/$$location$$/resources/$$resource$$
      - stderr: |
          Parsed [resource] resource: projects/my-other-project/locations/$$location$$/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test describe with full uri organization
      - command: auto resource-multitype resources describe organizations/my-other-org/locations/$$location$$/resources/$$resource$$
      - stderr: |
          Parsed [resource] resource: organizations/my-other-org/locations/$$location$$/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test different command structure
      - command: auto resource-multitype deeps resources describe $$resource$$ --deep=deep-resource
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test describe shorthand with property fallthrough
      command: auto resource-multitype resources describe $$resource$$ --location=$$location$$
      events:
        - expect_stderr: |
            Parsed [resource] resource: projects/my-project/locations/$$location$$/resources/$$resource$$
        - api_call:
            expect_request:
              uri: https://resourcemultitype.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                uid: mock_uid
                updateTime: mock_update_time
        - expect_stdout: |
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
        - expect_exit:
            code: 0
