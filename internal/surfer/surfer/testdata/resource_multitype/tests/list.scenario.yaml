    value: us-east1

- execute_command:
    label: test list shorthand with property fallthrough
    command: auto resource-multitype resources list --limit=1 --location=$$location$$
    events:
    - expect_stderr: |
        Parsed [deepOrLocationOrNested] resource: projects/my-project/locations/$$location$$
    - api_call:
        expect_request:
          uri: https://resourcemultitype.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            nextPageToken: mock_next_page_token
            resources:
            - createTime: mock_create_time
              etag: mock_etag
              name: mock_name
              uid: mock_uid
              updateTime: mock_update_time
            unreachable:
            - mock_unreachable
    - expect_stdout: |
        ---
        createTime: mock_create_time
        etag: mock_etag
        name: mock_name
        uid: mock_uid
        updateTime: mock_update_time
    - expect_exit:
        code: 0
