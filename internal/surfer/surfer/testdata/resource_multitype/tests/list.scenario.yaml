title: List a multitype resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test list shorthand with property fallthrough
  - command: auto resource-multitype resources list --limit=1 --location=$$location$$
  - stderr: |
      Parsed [deepOrLocationOrNested] resource: projects/my-project/locations/$$location$$
  - stdout: |
      ---
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
