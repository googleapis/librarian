option features.field_presence = IMPLICIT;

// Public message where the field is private in proto annotation.
message PublicProtoMessage {
  // Private message in service config.
  message ProtoPrivateMessage {
    option (google.api.message_visibility).restriction = "TRUSTED_TESTER";

    // Public field that should be private due to message.
    string public_field = 1;
  }

  // Public enum.
  enum PublicEnum {
    // Unspecified enum.
    PUBLIC_ENUM_UNSPECIFIED = 0;
    // Enum value.
    ONE = 1;
    // Enum value.
    TWO = 2;
  }

  // Private enum.
  enum PrivateEnum {
    option (google.api.enum_visibility).restriction = "TRUSTED_TESTER";

    // Unspecified enum.
    PRIVATE_ENUM_UNSPECIFIED = 0;
    // Enum value.
    THREE = 1;
    // Enum value.
    FOUR = 2;
  }

  // Private enum value.
  enum PrivateEnumValue {
    // Unspecified enum.
    PRIVATE_ENUM_VALUE_UNSPECIFIED = 0;
    // Enum value.
    FIVE = 1;
    // Enum value.
    SIX = 2 [(google.api.value_visibility).restriction = "TRUSTED_TESTER"];
  }

  // Always visible field.
  string public_field = 1;

  // Private field.
  string private_field = 2
      [(google.api.field_visibility).restriction = "TRUSTED_TESTER"];

  // Private field with multiple visibility annotations.
  string private_field_multiple_annotations = 3
      [(google.api.field_visibility).restriction =
           "TRUSTED_TESTER,GOOGLE_INTERNAL"];

  // Always visible enum.
  PublicEnum public_enum = 4;

  // Private enum.
  PrivateEnum private_enum = 5
      [(google.api.field_visibility).restriction = "TRUSTED_TESTER"];

  // Private enum value.
  PrivateEnumValue private_enum_value = 6;

  // Private message.
  // Since PrivateMessage is not visible, this field will cause a build error
  // unless annotated with TRUSTED_TESTER too.
  ProtoPrivateMessage private_message = 7
      [(google.api.field_visibility).restriction = "TRUSTED_TESTER"];
}

// Public message where the field is private in service config.
message PublicServiceConfigMessage {
  // Private message in service config.
  message ServiceConfigPrivateMessage {
    // Public field that should be private due to message.
    string public_field = 1;
  }

  // Public enum.
  enum PublicEnum {
    // Unspecified enum.
    PUBLIC_ENUM_UNSPECIFIED = 0;
    // Enum value.
    ONE = 1;
    // Enum value.
    TWO = 2;
  }

  // Private enum.
  enum PrivateEnum {
    // Unspecified enum.
    PRIVATE_ENUM_UNSPECIFIED = 0;
    // Enum value.
    THREE = 1;
    // Enum value.
    FOUR = 2;
  }

  // Private enum value.
  enum PrivateEnumValue {
    // Unspecified enum.
    PRIVATE_ENUM_VALUE_UNSPECIFIED = 0;
    // Enum value.
    FIVE = 1;
    // Enum value.
    SIX = 2;
  }

  // Always visible field.
  string public_field = 1;

  // Private field.
  string private_field = 2;

  // Private field with multiple visibility annotations.
  string private_field_multiple_annotations = 3;

  // Always visible enum.
  PublicEnum public_enum = 4;

  // Private enum.
  PrivateEnum private_enum = 5;

  // Private enum value.
  PrivateEnumValue private_enum_value = 6;

  // Private message.
  ServiceConfigPrivateMessage private_message = 7;
}

message Resource {
  option (.google.api.resource) = {
    type: "example.googleapis.com/Resource",
    pattern: "projects/{project}/locations/{location}/resources/{resource}"
  };

  // Resource name.
  string name = 1 [(.google.api.field_behavior) = IDENTIFIER];

  // The labels on the resource, which can be used for categorization.
  // similar to Kubernetes resource labels.
  map<string, string> labels = 2;

  // The unique identifier of the resource. UID is unique in the time
  // and space for this resource within the scope of the service. It is
  // typically generated by the server on successful creation of a resource
  // and must not be changed. UID is used to uniquely identify resources
  // with resource name reuses. This should be a UUID4.
  string uid = 3 [(.google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. An opaque value that uniquely identifies a version or
  // generation of a resource. It can be used to confirm that the client
  // and server agree on the ordering of a resource being written.
  string etag = 4 [(.google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was created.
  .google.protobuf.Timestamp create_time = 5
      [(.google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was last updated. Any
  // change to the resource made by users must refresh this value.
  // Changes to a resource made by the service should refresh this value.
  .google.protobuf.Timestamp update_time = 6
      [(.google.api.field_behavior) = OUTPUT_ONLY];

  // Publicly visible message field.
  PublicProtoMessage public_proto_message = 7;

  // Publicly visible message field.
  PublicServiceConfigMessage public_service_message = 8;
}

