    - api_call:
        expect_request:
          uri: https://publiconly.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - api_call:
        expect_request:
          uri: https://publiconly.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json&updateMask=%2A
          method: PATCH
          headers: {}
          body:
            json:
              publicProtoMessage:
                privateEnumValue: FIVE
                publicEnum: ONE
                publicField: foo
              publicServiceMessage:
                privateEnumValue: FIVE
