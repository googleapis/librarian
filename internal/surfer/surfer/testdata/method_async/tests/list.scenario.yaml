title: List an async resource
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test list an async resource
      - command: auto method-async resources list --location=$$location$$ --limit=1
      - stdout: |
          ---
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          updateTime: mock_update_time
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1s
  - execute_command:
      label: test list an async resource
      command: auto method-async resources list --location=$$location$$ --limit=1
      events:
        - api_call:
            expect_request:
              uri: https://methodasync.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                nextPageToken: mock_next_page_token
                resources:
                  - createTime: mock_create_time
                    etag: mock_etag
                    name: mock_name
                    updateTime: mock_update_time
                unreachable:
                  - mock_unreachable
        - expect_stdout: |
            ---
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            updateTime: mock_update_time
        - expect_exit:
            code: 0
