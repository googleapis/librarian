title: Updaate hidden command
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - execute:
      - label: test update command is hidden
      - command: auto hidden-command resources update --help
      - stdout: |+
          NAME
              gcloud auto hidden-command resources update - update resources

          SYNOPSIS
              gcloud auto hidden-command resources update
                  (RESOURCE : --location=LOCATION) [--etag=ETAG]
                  [--request-id=REQUEST_ID] [--[no-]validate-only]
                  [--labels=[LABELS,...]
                    | --update-labels=[UPDATE_LABELS,...] --clear-labels
                    | --remove-labels=REMOVE_LABELS] [GCLOUD_WIDE_FLAG ...]

          DESCRIPTION
              Update a resource

          EXAMPLES
              To update the resource, run:

                  $ gcloud auto hidden-command resources update

          POSITIONAL ARGUMENTS
               Resource resource - Identifier. Resource name. The arguments in this group
               can be used to specify the attributes of this resource. (NOTE) Some
               attributes are not given arguments in this group but can be set in other
               ways.

               To set the project attribute:
                ◆ provide the argument resource on the command line with a fully
                  specified name;
                ◆ provide the argument --project on the command line;
                ◆ set the property core/project.

               This must be specified.

                 RESOURCE
                    ID of the resource or fully qualified identifier for the resource.

                    To set the resource attribute:
                    ▸ provide the argument resource on the command line.

                    This positional argument must be specified if any of the other
                    arguments in this group are specified.

                 --location=LOCATION
                    The location id of the resource resource.

                    To set the location attribute:
                    ▸ provide the argument resource on the command line with a fully
                      specified name;
                    ▸ provide the argument --location on the command line.

          FLAGS
               --etag=ETAG
                  The etag known to the client for the expected state of the resource.
                  This is used with state-changing methods to prevent accidental
                  overwrites when multiple user agents might be acting in parallel on the
                  same resource.

                  An etag wildcard provide optimistic concurrency based on the expected
                  existence of the resource. The Any wildcard (*) requires that the
                  resource must already exists, and the Not Any wildcard (!*) requires
                  that it must not.

               --request-id=REQUEST_ID
                  An optional request ID to identify requests. Specify a unique request
                  ID so that if you must retry your request, the server will know to
                  ignore the request if it has already been completed. The server will
                  guarantee that for at least 60 minutes since the first request.

                  For example, consider a situation where you make an initial request and
                  the request times out. If you make the request again with the same
                  request ID, the server can check if original operation with the same
                  request ID was received, and if so, will ignore the second request.
                  This prevents clients from accidentally creating duplicate commitments.

                  The request ID must be a valid UUID with the exception that zero UUID
                  is not supported (00000000-0000-0000-0000-000000000000).

               --[no-]validate-only
                  If "validate_only" is set to true, the service will try to validate
                  that this request would succeed, but will not actually make changes.
                  Use --validate-only to enable and --no-validate-only to disable.

               Update labels.

               At most one of these can be specified:

                 --labels=[LABELS,...]
                    Set labels to new value. The labels on the resource, which can be
                    used for categorization. similar to Kubernetes resource labels.

                     KEY
                        Keys must start with a lowercase character and contain only
                        hyphens (-), underscores (_), lowercase characters, and numbers.

                     VALUE
                        Values must contain only hyphens (-), underscores (_), lowercase
                        characters, and numbers.

                    Shorthand Example:

                        --labels=string=string

                    JSON Example:

                        --labels='{"string": "string"}'

                    File Example:

                        --labels=path_to_file.(yaml|json)

                 Or at least one of these can be specified:

                   --update-labels=[UPDATE_LABELS,...]
                      Update labels value or add key value pair. The labels on the
                      resource, which can be used for categorization. similar to
                      Kubernetes resource labels.

                       KEY
                          Keys must start with a lowercase character and contain only
                          hyphens (-), underscores (_), lowercase characters, and
                          numbers.

                       VALUE
                          Values must contain only hyphens (-), underscores (_),
                          lowercase characters, and numbers.

                      Shorthand Example:

                          --update-labels=string=string

                      JSON Example:

                          --update-labels='{"string": "string"}'

                      File Example:

                          --update-labels=path_to_file.(yaml|json)

                   At most one of these can be specified:

                     --clear-labels
                        Clear labels value and set to empty map.

                     --remove-labels=REMOVE_LABELS
                        Remove existing value from map labels. Sets remove_labels value.

                        Shorthand Example:

                            --remove-labels=string,string

                        JSON Example:

                            --remove-labels=["string"]

                        File Example:

                            --remove-labels=path_to_file.(yaml|json)

          GCLOUD WIDE FLAGS
              These flags are available to all commands: --access-token-file, --account,
              --billing-project, --configuration, --flags-file, --flatten, --format,
              --help, --impersonate-service-account, --log-http, --project, --quiet,
              --trace-token, --user-output-enabled, --verbosity.

              Run $ gcloud help for details.

          API REFERENCE
              This command uses the hiddencommand/v1 API. The full documentation for this
              API can be found at:

          NOTES
              This command is an internal implementation detail and may change or
              disappear without notice.

      - error: '1: 0'
