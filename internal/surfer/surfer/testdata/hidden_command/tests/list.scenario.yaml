title: List a hidden command
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- execute:
  - label: test list command is hidden
  - command: auto hidden-command resources list --help
  - stdout: |+
      NAME
          gcloud auto hidden-command resources list - list resources

      SYNOPSIS
          gcloud auto hidden-command resources list --location=LOCATION
              [--filter=EXPRESSION] [--limit=LIMIT] [--page-size=PAGE_SIZE]
              [--sort-by=[FIELD,...]] [--uri] [GCLOUD_WIDE_FLAG ...]

      DESCRIPTION
          List resources

      EXAMPLES
          To list all resources, run:

              $ gcloud auto hidden-command resources list

      REQUIRED FLAGS
           Location resource - The parent of the resource. This represents a Cloud
           resource. (NOTE) Some attributes are not given arguments in this group but
           can be set in other ways.

           To set the project attribute:
            ◆ provide the argument --location on the command line with a fully
              specified name;
            ◆ provide the argument --project on the command line;
            ◆ set the property core/project.

           This must be specified.

             --location=LOCATION
                ID of the location or fully qualified identifier for the location.

                To set the location attribute:
                ▸ provide the argument --location on the command line.

      LIST COMMAND FLAGS
           --filter=EXPRESSION
              Apply a Boolean filter EXPRESSION to each resource item to be listed.
              If the expression evaluates True, then that item is listed. For more
              details and examples of filter expressions, run $ gcloud topic filters.
              This flag interacts with other flags that are applied in this order:
              --flatten, --sort-by, --filter, --limit.

           --limit=LIMIT
              Maximum number of resources to list. The default is unlimited. This
              flag interacts with other flags that are applied in this order:
              --flatten, --sort-by, --filter, --limit.

           --page-size=PAGE_SIZE
              Some services group resource list output into pages. This flag
              specifies the maximum number of resources per page. The default is
              determined by the service if it supports paging, otherwise it is
              unlimited (no paging). Paging may be applied before or after --filter
              and --limit depending on the service.

           --sort-by=[FIELD,...]
              Comma-separated list of resource field key names to sort by. The
              default order is ascending. Prefix a field with ``~'' for descending
              order on that field. This flag interacts with other flags that are
              applied in this order: --flatten, --sort-by, --filter, --limit.

           --uri
              Print a list of resource URIs instead of the default output, and change
              the command output to a list of URIs. If this flag is used with
              --format, the formatting is applied on this URI list. To display URIs
              alongside other keys instead, use the uri() transform.

      GCLOUD WIDE FLAGS
          These flags are available to all commands: --access-token-file, --account,
          --billing-project, --configuration, --flags-file, --flatten, --format,
          --help, --impersonate-service-account, --log-http, --project, --quiet,
          --trace-token, --user-output-enabled, --verbosity.

          Run $ gcloud help for details.

      API REFERENCE
          This command uses the hiddencommand/v1 API. The full documentation for this
          API can be found at:

      NOTES
          This command is an internal implementation detail and may change or
          disappear without notice.

  - error: '1: 0'
