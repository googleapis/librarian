title: Describe a resource in multiservice
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test describe second resource
  - command: auto multi-service seconds resources describe $$resource$$ --location=$$location$$
      --second=$$second$$
  - stdout: |
      name: mock_name
      resourceTwoField: mock_resource_two_field
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: second
    value: my-second
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test describe second resource
    command: auto multi-service seconds resources describe $$resource$$ --location=$$location$$
      --second=$$second$$
    events:
    - api_call:
        expect_request:
          uri: https://multiservice.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/seconds/$$second$$/resources/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            name: mock_name
            resourceTwoField: mock_resource_two_field
    - expect_stdout: |
        name: mock_name
        resourceTwoField: mock_resource_two_field
    - expect_exit:
        code: 0
