title: Create a parent resource in multiservice
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test create parent resource
  - command: auto multi-service resources create $$resource$$ --location=$$location$$
      --shared-resource-field=foo
  - stderr: |
      Created resource [$$resource$$].
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test create parent resource
    command: auto multi-service resources create $$resource$$ --location=$$location$$
      --shared-resource-field=foo
    events:
    - api_call:
        expect_request:
          uri: https://multiservice.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              sharedResourceField: foo
        return_response:
          status: 200
          headers: {}
          body:
            name: mock_name
            sharedResourceField: mock_shared_resource_field
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0
