// Service example for multiple versions and multiple release tracks.
// Service One will be available for v1 and v1alpha versions.
// v1 version will be mapped to GA release track.
// v1alpha version will be mapped to ALPHA release track.
service ServiceOne {
  // Create resource one.
  rpc CreateResourceOne(CreateResourceOneRequest)
      returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/{$api_version}/{parent=projects/*/locations/*}/resourceOnes"
      body: "resource_one"
    };
    option (google.longrunning.operation_info) = {
      response_type: "ResourceOne"
      metadata_type: "OperationMetadata"
    };
  }

  // Get resource one.
  rpc GetResourceOne(GetResourceOneRequest) returns (ResourceOne) {
    option (google.api.http) = {
      get: "/{$api_version}/{name=projects/*/locations/*/resourceOnes/*}"
    };
  }

  // Delete resource one.
  rpc DeleteResourceOne(DeleteResourceOneRequest)
      returns (google.longrunning.Operation) {
    option (google.api.http) = {
      delete: "/{$api_version}/{name=projects/*/locations/*/resourceOnes/*}"
    };
    option (google.api.method_versioning).restriction = "v1alpha";
    option (google.longrunning.operation_info) = {
      response_type: "google.protobuf.Empty"
      metadata_type: "OperationMetadata"
    };
  }

  // Archives the given resource.
  rpc ArchiveResourceOne(ArchiveResourceOneRequest) returns (ResourceOne) {
    option (google.api.http) = {
      post: "/{$api_version}/{name=projects/*/locations/*/resourceOnes/*}:archive"
      body: "*"
    };
  }
}

// Message to create a resource one
message CreateResourceOneRequest {
  // Location of the resource.
  string parent = 1 [
    (google.api.resource_container).type = "RESOURCE",
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "multiversionmultitrack.googleapis.com/ResourceOne"
    }
  ];

  // The ID value for the new resource.
  string resource_one_id = 2 [(.google.api.field_behavior) = REQUIRED];

  // Resource to create.
  ResourceOne resource_one = 3;
}

// Message to request a resource one
message GetResourceOneRequest {
  // The name of the resource.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "multiversionmultitrack.googleapis.com/ResourceOne"
    }
  ];
}

// Message to delete a resource one
message DeleteResourceOneRequest {
  // The name of the resource.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "multiversionmultitrack.googleapis.com/ResourceOne"
    }
  ];
}

// Message to archive a resource one
message ArchiveResourceOneRequest {
  // The name of the resource.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "multiversionmultitrack.googleapis.com/ResourceOne"
    }
  ];

  // String field.
  string string_field = 2;
}

