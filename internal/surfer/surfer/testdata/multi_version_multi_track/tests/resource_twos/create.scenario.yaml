title: Create a multiversion resource
release_tracks: [ALPHA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test create two multiversion resource
      - command: auto multi-version-track resource-twos create $$resource$$ --location=$$location$$ --resource-two-field=foo
      - stderr: |
          Create request issued for: [$$resource$$]
      - stderr: |
          Created resourceTwo [$$resource$$].
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test create two multiversion resource
      command: auto multi-version-track resource-twos create $$resource$$ --location=$$location$$ --resource-two-field=foo
      events:
        - api_call:
            expect_request:
              uri: https://multiversiontrack.$$UNIVERSE_DOMAIN$$/v1alpha/projects/my-project/locations/$$location$$/resourceTwos?alt=json&resourceTwoId=$$resource$$
              method: POST
              headers: {}
              body:
                json:
                  resourceTwoField: foo
            return_response:
              status: 200
              headers: {}
              body:
                done: true
                name: projects/fake-project/locations/us-central1/operations/mock_operation
            poll_operation: true
        - expect_stderr: |
            Create request issued for: [$$resource$$]
        - api_call:
            expect_request:
              uri: https://multiversiontrack.$$UNIVERSE_DOMAIN$$/v1alpha/projects/my-project/locations/$$location$$/resourceTwos/$$resource$$?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                name: mock_name
                resourceTwoField: mock_resource_two_field
        - expect_stderr: |
            Created resourceTwo [$$resource$$].
        - expect_exit:
            code: 0
