title: Delete a multiversion resource
release_tracks: [ALPHA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test delete multiversion resource runs in multiple release tracks
      - command: auto multi-version-track resource-ones delete $$resource$$ --location=$$location$$
      - prompt:
          - message: You are about to delete resourceOne [$$resource$$]
          - input: y
      - stderr: |
          Delete request issued for: [$$resource$$]
          Deleted resourceOne [$$resource$$].
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - define_reference:
      reference: api-version
      track_values:
        ALPHA: v1alpha
  - execute_command:
      label: test delete multiversion resource runs in multiple release tracks
      command: auto multi-version-track resource-ones delete $$resource$$ --location=$$location$$
      events:
        - expect_prompt_continue:
            message: You are about to delete resourceOne [$$resource$$]
            user_input: y
        - api_call:
            expect_request:
              uri: https://multiversiontrack.$$UNIVERSE_DOMAIN$$/$$api-version$$/projects/my-project/locations/$$location$$/resourceOnes/$$resource$$?alt=json
              method: DELETE
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                done: true
                name: projects/fake-project/locations/us-central1/operations/mock_operation
            poll_operation: true
        - expect_stderr: |
            Delete request issued for: [$$resource$$]
            Deleted resourceOne [$$resource$$].
        - expect_exit:
            code: 0
