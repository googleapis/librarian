title: Describe a multiversion resource
release_tracks: [ALPHA, GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test describe multiversion resource runs in multiple release tracks
  - command: auto multi-version-track resource-ones describe $$resource$$ --location=$$location$$
  - stdout: |
      name: mock_name
      resourceOneField: mock_resource_one_field
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource
- define_reference:
    reference: api-version
    track_values:
      ALPHA: v1alpha
      GA: v1

- execute_command:
    label: test describe multiversion resource runs in multiple release tracks
    command: auto multi-version-track resource-ones describe $$resource$$ --location=$$location$$
    events:
    - api_call:
        expect_request:
          uri: https://multiversiontrack.$$UNIVERSE_DOMAIN$$/$$api-version$$/projects/my-project/locations/$$location$$/resourceOnes/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            name: mock_name
            resourceOneField: mock_resource_one_field
    - expect_stdout: |
        name: mock_name
        resourceOneField: mock_resource_one_field
    - expect_exit:
        code: 0
