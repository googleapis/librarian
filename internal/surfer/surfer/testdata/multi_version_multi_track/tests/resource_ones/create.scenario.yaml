title: Create a multiversion resource
release_tracks: [ALPHA, GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test create one multiversion resource
      - command: auto multi-version-track resource-ones create $$resource$$ --location=$$location$$ --resource-one-field=foo
      - stderr: |
          Create request issued for: [$$resource$$]
      - stderr: |
          Created resourceOne [$$resource$$].
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - define_reference:
      reference: api-version
      track_values:
        ALPHA: v1alpha
        GA: v1
  - execute_command:
      label: test create one multiversion resource
      command: auto multi-version-track resource-ones create $$resource$$ --location=$$location$$ --resource-one-field=foo
      events:
        - api_call:
            expect_request:
              uri: https://multiversiontrack.$$UNIVERSE_DOMAIN$$/$$api-version$$/projects/my-project/locations/$$location$$/resourceOnes?alt=json&resourceOneId=$$resource$$
              method: POST
              headers: {}
              body:
                json:
                  resourceOneField: foo
            return_response:
              status: 200
              headers: {}
              body:
                done: true
                name: projects/fake-project/locations/us-central1/operations/mock_operation
            poll_operation: true
        - expect_stderr: |
            Create request issued for: [$$resource$$]
        - api_call:
            expect_request:
              uri: https://multiversiontrack.$$UNIVERSE_DOMAIN$$/$$api-version$$/projects/my-project/locations/$$location$$/resourceOnes/$$resource$$?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                name: mock_name
                resourceOneField: mock_resource_one_field
        - expect_stderr: |
            Created resourceOne [$$resource$$].
        - expect_exit:
            code: 0
