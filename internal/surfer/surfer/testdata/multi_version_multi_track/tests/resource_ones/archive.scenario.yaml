title: Custom method on a multiversion resource
release_tracks: [ALPHA, GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test multiversion custom command runs
      - command: auto multi-version-track resource-ones archive $$resource$$ --location=$$location$$ --string-field=foo
      - stdout: |
          name: mock_name
          resourceOneField: mock_resource_one_field
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - define_reference:
      reference: api-version
      track_values:
        ALPHA: v1alpha
        GA: v1
  - execute_command:
      label: test multiversion custom command runs
      command: auto multi-version-track resource-ones archive $$resource$$ --location=$$location$$ --string-field=foo
      events:
        - api_call:
            expect_request:
              uri: https://multiversiontrack.$$UNIVERSE_DOMAIN$$/$$api-version$$/projects/my-project/locations/$$location$$/resourceOnes/$$resource$$:archive?alt=json
              method: POST
              headers: {}
              body:
                json:
                  stringField: foo
            return_response:
              status: 200
              headers: {}
              body:
                name: mock_name
                resourceOneField: mock_resource_one_field
        - expect_stdout: |
            name: mock_name
            resourceOneField: mock_resource_one_field
        - expect_exit:
            code: 0
