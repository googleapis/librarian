title: Delete operation for multiversion
release_tracks: [ALPHA, GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test describe operation multiple api versions
      - command: auto multi-version-track operations describe my-operation --location=$$location$$
      - stdout: |
          done: true
          name: $$operation$$
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: api-version
      track_values:
        ALPHA: v1alpha
        GA: v1
  - execute_command:
      label: test describe operation multiple api versions
      command: auto multi-version-track operations describe my-operation --location=$$location$$
      events:
        - api_call:
            expect_request:
              uri: https://multiversiontrack.$$UNIVERSE_DOMAIN$$/$$api-version$$/projects/my-project/locations/$$location$$/operations/my-operation?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                done: true
                name: projects/fake-project/locations/us-central1/operations/mock_operation
            poll_operation: true
        - expect_stdout: |
            done: true
            name: $$operation$$
        - expect_exit:
            code: 0
