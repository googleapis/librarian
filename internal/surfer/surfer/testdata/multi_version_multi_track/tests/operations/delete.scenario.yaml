        message: You are about to delete operation [my-operation]
        user_input: y
    - api_call:
        expect_request:
          uri: https://multiversiontrack.$$UNIVERSE_DOMAIN$$/$$api-version$$/projects/my-project/locations/$$location$$/operations/my-operation?alt=json
          method: DELETE
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body: '{}'
    - expect_stderr: |
        Deleted operation [my-operation].
    - expect_exit:
        code: 0
