title: Delete operation for multiversion
release_tracks: [ALPHA, GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test delete operation multiple api versions
  - command: auto multi-version-track operations delete my-operation --location=$$location$$
  - prompt:
    - message: You are about to delete operation [my-operation]
    - input: y
  - stderr: |
      Deleted operation [my-operation].
actions:
- set_property:
