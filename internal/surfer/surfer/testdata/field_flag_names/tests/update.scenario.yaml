title: Update a resource with truncated flag names
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test we are able to specify complex nested fields with truncated flag names
      - command: auto field-flag-names resources update $$resource$$ --location=$$location$$ --field-with-no-parent=no-parent --mutex-group-child-string-field=this-string --duplicate-message=my-duplicate-message --redundant-message-string-field=my-redundant-value --string-field=my-string --included-child-string-field=my-included-string --resource-quiet=yes-please --billing-info-project=my-billing-project --labels=foo=bar
      - stderr: |
          Updated resource [$$resource$$].
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          fieldWithNoParent: mock_field_with_no_parent
          name: mock_name
          quiet: mock_quiet
          uid: mock_uid
          updateTime: mock_update_time
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test we are able to specify complex nested fields with truncated flag names
      command: auto field-flag-names resources update $$resource$$ --location=$$location$$ --field-with-no-parent=no-parent --mutex-group-child-string-field=this-string --duplicate-message=my-duplicate-message --redundant-message-string-field=my-redundant-value --string-field=my-string --included-child-string-field=my-included-string --resource-quiet=yes-please --billing-info-project=my-billing-project --labels=foo=bar
      events:
        - api_call:
            expect_request:
              uri: https://fieldflagnames.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                fieldWithNoParent: mock_field_with_no_parent
                name: mock_name
                quiet: mock_quiet
                uid: mock_uid
                updateTime: mock_update_time
        - api_call:
            expect_request:
              uri: https://fieldflagnames.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json&updateMask=%2A
              method: PATCH
              headers: {}
              body:
                json:
                  billingInfo:
                    billing:
                      project: my-billing-project
                  createTime: mock_create_time
                  etag: mock_etag
                  fieldWithNoParent: no-parent
                  labels:
                    foo: bar
                  msg:
                    duplicateMessage:
                      duplicateMessage: my-duplicate-message
                    excluded:
                      stringField: my-string
                    included:
                      parent:
                        child:
                          stringField: my-included-string
                    mutexGroup:
                      parent:
                        child:
                          stringField: this-string
                    redundantMessage:
                      redundantStringField: my-redundant-value
                  name: mock_name
                  quiet: yes-please
                  uid: mock_uid
                  updateTime: mock_update_time
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                fieldWithNoParent: mock_field_with_no_parent
                name: mock_name
                quiet: mock_quiet
                uid: mock_uid
                updateTime: mock_update_time
        - expect_stderr: |
            Updated resource [$$resource$$].
        - expect_stdout: |
            createTime: mock_create_time
            etag: mock_etag
            fieldWithNoParent: mock_field_with_no_parent
            name: mock_name
            quiet: mock_quiet
            uid: mock_uid
            updateTime: mock_update_time
        - expect_exit:
            code: 0
