title: non-CRUDL command with truncated flag name
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test we are able to specify complex nested fields with truncated flag names
  - command: auto field-flag-names resources archive $$resource$$ --location=$$location$$
      --resource-field-with-no-parent=no-parent --mutex-group-child-string-field=this-string
      --duplicate-message=my-duplicate-message --redundant-message-string-field=my-redundant-value
      --string-field=my-string --included-child-string-field=my-included-string --resource-quiet=yes-please
      --billing-info-project=my-billing-project --resource-labels=foo=bar
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      fieldWithNoParent: mock_field_with_no_parent
      name: mock_name
      quiet: mock_quiet
      uid: mock_uid
      updateTime: mock_update_time
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test we are able to specify complex nested fields with truncated flag names
    command: auto field-flag-names resources archive $$resource$$ --location=$$location$$
      --resource-field-with-no-parent=no-parent --mutex-group-child-string-field=this-string
      --duplicate-message=my-duplicate-message --redundant-message-string-field=my-redundant-value
      --string-field=my-string --included-child-string-field=my-included-string --resource-quiet=yes-please
      --billing-info-project=my-billing-project --resource-labels=foo=bar
    events:
    - api_call:
        expect_request:
          uri: https://fieldflagnames.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$:archive?alt=json
          method: POST
          headers: {}
          body:
            json:
              resource:
                billingInfo:
                  billing:
                    project: my-billing-project
                fieldWithNoParent: no-parent
                labels:
                  foo: bar
                msg:
                  duplicateMessage:
                    duplicateMessage: my-duplicate-message
                  excluded:
                    stringField: my-string
                  included:
                    parent:
                      child:
                        stringField: my-included-string
                  mutexGroup:
                    parent:
                      child:
                        stringField: this-string
                  redundantMessage:
                    redundantStringField: my-redundant-value
                quiet: yes-please
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            fieldWithNoParent: mock_field_with_no_parent
            name: mock_name
            quiet: mock_quiet
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stdout: |
        createTime: mock_create_time
        etag: mock_etag
        fieldWithNoParent: mock_field_with_no_parent
        name: mock_name
        quiet: mock_quiet
        uid: mock_uid
        updateTime: mock_update_time
    - expect_exit:
        code: 0
