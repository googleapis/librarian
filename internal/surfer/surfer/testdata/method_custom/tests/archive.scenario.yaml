title: Non-CRUDL command on resource
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test archive fully specified
      - command: auto method-custom resources archive $$resource$$ --location=$$location$$ --string-field=foo
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test archive fully specified
      command: auto method-custom resources archive $$resource$$ --location=$$location$$ --string-field=foo
      events:
        - api_call:
            expect_request:
              uri: https://methodcustom.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$:archive?alt=json
              method: POST
              headers: {}
              body:
                json:
                  stringField: foo
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                uid: mock_uid
                updateTime: mock_update_time
        - expect_stdout: |
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
        - expect_exit:
            code: 0
