title: Custom method on resource collection
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test get paginated search results
      - command: auto method-custom resources search --location=$$location$$ --target=foo --service-account=bar --limit=1
      - stdout: |
          ---
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - execute_command:
      label: test get paginated search results
      command: auto method-custom resources search --location=$$location$$ --target=foo --service-account=bar --limit=1
      events:
        - api_call:
            expect_request:
              uri: https://methodcustom.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources:search?alt=json&serviceAccount=bar&target=foo
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                nextPageToken: mock_next_page_token
                resources:
                  - createTime: mock_create_time
                    etag: mock_etag
                    name: mock_name
                    uid: mock_uid
                    updateTime: mock_update_time
        - expect_stdout: |
            ---
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
        - expect_exit:
            code: 0
