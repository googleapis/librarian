title: Describe a resource with simple field type
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test describe does not require any additional flags
      - command: auto field-simple-types resources describe $$resource$$ --location=$$location$$
      - stdout: |
          boolField: false
          createTime: mock_create_time
          etag: mock_etag
          floatField: 1.0
          name: mock_name
          requiredBoolField: false
          stringField: mock_string_field
          stringFileField: mock_string_file_field
          uid: mock_uid
          updateTime: mock_update_time
