title: Create a resource with simple field types
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test create a resource with all possible simple field types not specified
  - command: auto field-simple-types resources create $$resource$$ --location=$$location$$
      --no-required-bool-field
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create a resource with all possible simple field types
  - command: auto field-simple-types resources create $$resource$$ --location=$$location$$
      --string-field=foo --int-field=123 --float-field=123.456 --bool-field --required-bool-field
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create a resource with file type
  - command: auto field-simple-types resources create $$resource$$ --location=$$location$$
      --bytes-file-field-from-file=my-file.txt --string-file-field-from-file=my-file.txt
      --no-required-bool-field
  - stderr: |
      Created resource [$$resource$$].
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource
- write_file:
    path: my-file.txt
    contents: hello world

- execute_command:
    label: test create a resource with all possible simple field types not specified
    command: auto field-simple-types resources create $$resource$$ --location=$$location$$
      --no-required-bool-field
    events:
    - api_call:
        expect_request:
          uri: https://fieldsimpletypes.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              requiredBoolField: false
        return_response:
          status: 200
          headers: {}
          body:
            boolField: false
            createTime: mock_create_time
            etag: mock_etag
            floatField: 1.0
            name: mock_name
            requiredBoolField: false
            stringField: mock_string_field
            stringFileField: mock_string_file_field
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0
- execute_command:
    label: test create a resource with all possible simple field types
    command: auto field-simple-types resources create $$resource$$ --location=$$location$$
      --string-field=foo --int-field=123 --float-field=123.456 --bool-field --required-bool-field
    events:
    - api_call:
        expect_request:
          uri: https://fieldsimpletypes.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              boolField: true
              floatField: 123.456
              intField: 123
              requiredBoolField: true
              stringField: foo
        return_response:
          status: 200
          headers: {}
          body:
            boolField: false
            createTime: mock_create_time
            etag: mock_etag
            floatField: 1.0
            name: mock_name
            requiredBoolField: false
            stringField: mock_string_field
            stringFileField: mock_string_file_field
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0
- execute_command:
    label: test create a resource with file type
    command: auto field-simple-types resources create $$resource$$ --location=$$location$$
      --bytes-file-field-from-file=my-file.txt --string-file-field-from-file=my-file.txt
      --no-required-bool-field
    events:
    - api_call:
        expect_request:
          uri: https://fieldsimpletypes.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              bytesFileField: aGVsbG8gd29ybGQ=
              requiredBoolField: false
              stringFileField: hello world
        return_response:
          status: 200
          headers: {}
          body:
            boolField: false
            createTime: mock_create_time
            etag: mock_etag
            floatField: 1.0
            name: mock_name
            requiredBoolField: false
            stringField: mock_string_field
            stringFileField: mock_string_file_field
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0
