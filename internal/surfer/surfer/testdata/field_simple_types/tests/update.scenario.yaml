title: Update a resource with simple field types
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test update a resource with all possible simple field types not specified
  - command: auto field-simple-types resources update $$resource$$ --location=$$location$$
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      boolField: false
      createTime: mock_create_time
      etag: mock_etag
      floatField: 1.0
      name: mock_name
      requiredBoolField: false
      stringField: mock_string_field
      stringFileField: mock_string_file_field
      uid: mock_uid
      updateTime: mock_update_time
