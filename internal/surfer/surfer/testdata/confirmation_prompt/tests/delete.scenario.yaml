title: Delete a resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test display custom confirmation prompt on delete
  - command: auto confirmation-prompt resources delete $$resource$$ --location=$$location$$
  - prompt:
    - message: Are you super duper sure you want to delete resource?
    - input: y
  - stderr: |
      Deleted resource [$$resource$$].
- execute:
  - label: test display custom confirmation prompt even with validate only
  - command: auto confirmation-prompt resources delete $$resource$$ --location=$$location$$
      --etag=my-etag --validate-only --request-id=my-id
  - prompt:
    - message: Are you super duper sure you want to delete resource?
    - input: y
  - stderr: |
      Deleted resource [$$resource$$].
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test display custom confirmation prompt on delete
    command: auto confirmation-prompt resources delete $$resource$$ --location=$$location$$
    events:
    - expect_prompt_continue:
        message: Are you super duper sure you want to delete resource?
        user_input: y
    - api_call:
        expect_request:
          uri: https://confirmationprompt.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: DELETE
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body: '{}'
    - expect_stderr: |
        Deleted resource [$$resource$$].
    - expect_exit:
        code: 0

- execute_command:
    label: test display custom confirmation prompt even with validate only
    command: auto confirmation-prompt resources delete $$resource$$ --location=$$location$$
      --etag=my-etag --validate-only --request-id=my-id
    events:
    - expect_prompt_continue:
        message: Are you super duper sure you want to delete resource?
        user_input: y
    - api_call:
        expect_request:
          uri: https://confirmationprompt.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json&etag=my-etag&requestId=my-id&validateOnly=True
          method: DELETE
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body: '{}'
    - expect_stderr: |
        Deleted resource [$$resource$$].
    - expect_exit:
        code: 0
