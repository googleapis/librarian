title: Create a multitype resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test can run create command with all flags
  - command: auto help-text resources create $$resource$$ --location=$$location$$
      --display-name=foo --detail=bar --multiline=my-multiline --enum-type=option-a
      --integer-field=123 --long-field=123 --double-field=123.456 --date-time=2020-01-01T00:00:00Z
      --my-duration=123s
  - stderr: |
      Create request issued for: [$$resource$$]
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test the outputted help text
  - command: auto help-text resources create --help
  - stdout: |
      NAME
          gcloud auto help-text resources create - create help text resource!!

      SYNOPSIS
          gcloud auto help-text resources create (RESOURCE : --location=LOCATION)
              [--async] [--date-time=DATE_TIME] [--detail=DETAIL]
              [--display-name=DISPLAY_NAME] [--double-field=DOUBLE_FIELD]
              [--enum-type=ENUM_TYPE] [--integer-field=INTEGER_FIELD]
              [--labels=[LABELS,...]] [--long-field=LONG_FIELD]
              [--multiline=MULTILINE] [--my-duration=[MY_DURATION,...]]
              [--request-id=REQUEST_ID] [--validate-only] [GCLOUD_WIDE_FLAG ...]

      DESCRIPTION
          Create help text resource!!

      EXAMPLES
          To create a help text resource:

              $ gcloud auto help-text resources create --foo=bar

      POSITIONAL ARGUMENTS
           Resource resource - Identifier. Resource name in the format:
           projects/{project}/locations/{location}/resources/{resource}. The
           arguments in this group can be used to specify the attributes of this
           resource. (NOTE) Some attributes are not given arguments in this group but
           can be set in other ways.

           To set the project attribute:
            ◆ provide the argument resource on the command line with a fully
              specified name;
            ◆ provide the argument --project on the command line;
            ◆ set the property core/project.

           This must be specified.

             RESOURCE
                ID of the resource or fully qualified identifier for the resource.

                To set the resource attribute:
                ▸ provide the argument resource on the command line.

                This positional argument must be specified if any of the other
                arguments in this group are specified.

             --location=LOCATION
                The location id of the resource resource.

                To set the location attribute:
                ▸ provide the argument resource on the command line with a fully
                  specified name;
                ▸ provide the argument --location on the command line.

      FLAGS
           --async
              Return immediately, without waiting for the operation in progress to
              complete.

           --date-time=DATE_TIME
              A datetime field.

           --detail=DETAIL
              A field that's explicitly marked input only and optional.

           --display-name=DISPLAY_NAME
              A standard field for the resource.

           --double-field=DOUBLE_FIELD
              A double field.

           --enum-type=ENUM_TYPE
              An enum field. ENUM_TYPE must be one of:

               option-a
                  Option A.
               option-b
                  Option B.

           --integer-field=INTEGER_FIELD
              An integer field.

           --labels=[LABELS,...]
              The labels on the resource, which can be used for categorization.
              similar to Kubernetes resource labels.

               KEY
                  Keys must start with a lowercase character and contain only hyphens
                  (-), underscores (_), lowercase characters, and numbers.

               VALUE
                  Values must contain only hyphens (-), underscores (_), lowercase
                  characters, and numbers.

              Shorthand Example:

                  --labels=string=string

              JSON Example:

                  --labels='{"string": "string"}'

              File Example:

                  --labels=path_to_file.(yaml|json)

           --long-field=LONG_FIELD
              A long field.

           --multiline=MULTILINE
              A field with a description that spans multiple lines. Here is a second
              line. And here is a third line.

           --my-duration=[MY_DURATION,...]
              A repeated duration field.

           --request-id=REQUEST_ID
              An optional request ID to identify requests. Specify a unique request
              ID so that if you must retry your request, the server will know to
              ignore the request if it has already been completed. The server will
              guarantee that for at least 60 minutes since the first request.

              For example, consider a situation where you make an initial request and
              the request times out. If you make the request again with the same
              request ID, the server can check if original operation with the same
              request ID was received, and if so, will ignore the second request.
              This prevents clients from accidentally creating duplicate commitments.

              The request ID must be a valid UUID with the exception that zero UUID
              is not supported (00000000-0000-0000-0000-000000000000).

           --validate-only
              If "validate_only" is set to true, the service will try to validate
              that this request would succeed, but will not actually make changes.

      GCLOUD WIDE FLAGS
          These flags are available to all commands: --access-token-file, --account,
          --billing-project, --configuration, --flags-file, --flatten, --format,
          --help, --impersonate-service-account, --log-http, --project, --quiet,
          --trace-token, --user-output-enabled, --verbosity.

          Run $ gcloud help for details.

      API REFERENCE
          This command uses the helptext/v1 API. The full documentation for this API
          can be found at:
  - error: '1: 0'
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test can run create command with all flags
    command: auto help-text resources create $$resource$$ --location=$$location$$
      --display-name=foo --detail=bar --multiline=my-multiline --enum-type=option-a
      --integer-field=123 --long-field=123 --double-field=123.456 --date-time=2020-01-01T00:00:00Z
      --my-duration=123s
    events:
    - api_call:
        expect_request:
          uri: https://helptext.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              dateTime: '2020-01-01T00:00:00.000Z'
              detail: bar
              displayName: foo
              doubleField: 123.456
              enumType: OPTION_A
              integerField: 123
              longField: '123'
              multiline: my-multiline
              myDuration:
              - 123s
        return_response:
          status: 200
          headers: {}
          body:
            done: true
            name: projects/fake-project/locations/us-central1/operations/mock_operation
        poll_operation: true
    - expect_stderr: |
        Create request issued for: [$$resource$$]
    - api_call:
        expect_request:
          uri: https://helptext.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0

