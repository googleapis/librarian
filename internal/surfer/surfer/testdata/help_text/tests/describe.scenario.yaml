title: Describe a resource with help text
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test can run describe command with all flags
  - command: auto help-text resources describe $$resource$$ --location=$$location$$
  - stdout: |
      createTime: mock_create_time
      dateTime: mock_date_time
      detail: mock_detail
      displayName: mock_display_name
      doubleField: 1.0
      etag: mock_etag
      multiline: mock_multiline
      myDuration:
      - mock_my_duration
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test describe command help text
  - command: auto help-text resources describe --help
  - stdout: |
      NAME
          gcloud auto help-text resources describe - describe resources

      SYNOPSIS
          gcloud auto help-text resources describe (RESOURCE : --location=LOCATION)
              [GCLOUD_WIDE_FLAG ...]

      DESCRIPTION
          Describe a resource

      EXAMPLES
          To describe the resource, run:

              $ gcloud auto help-text resources describe

      POSITIONAL ARGUMENTS
           Resource resource - The resource name of the resource within a service.
           The arguments in this group can be used to specify the attributes of this
           resource. (NOTE) Some attributes are not given arguments in this group but
           can be set in other ways.

           To set the project attribute:
            ◆ provide the argument resource on the command line with a fully
              specified name;
            ◆ provide the argument --project on the command line;
            ◆ set the property core/project.

           This must be specified.

             RESOURCE
                ID of the resource or fully qualified identifier for the resource.

                To set the resource attribute:
                ▸ provide the argument resource on the command line.

                This positional argument must be specified if any of the other
                arguments in this group are specified.

             --location=LOCATION
                The location id of the resource resource.

                To set the location attribute:
                ▸ provide the argument resource on the command line with a fully
                  specified name;
                ▸ provide the argument --location on the command line.

      GCLOUD WIDE FLAGS
          These flags are available to all commands: --access-token-file, --account,
          --billing-project, --configuration, --flags-file, --flatten, --format,
          --help, --impersonate-service-account, --log-http, --project, --quiet,
          --trace-token, --user-output-enabled, --verbosity.

          Run $ gcloud help for details.

      API REFERENCE
          This command uses the helptext/v1 API. The full documentation for this API
          can be found at:
  - error: '1: 0'
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test can run describe command with all flags
    command: auto help-text resources describe $$resource$$ --location=$$location$$
    events:
    - api_call:
        expect_request:
          uri: https://helptext.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            dateTime: mock_date_time
            detail: mock_detail
            displayName: mock_display_name
            doubleField: 1.0
            etag: mock_etag
            multiline: mock_multiline
            myDuration:
            - mock_my_duration
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stdout: |
        createTime: mock_create_time
        dateTime: mock_date_time
        detail: mock_detail
        displayName: mock_display_name
        doubleField: 1.0
        etag: mock_etag
        multiline: mock_multiline
        myDuration:
        - mock_my_duration
        name: mock_name
        uid: mock_uid
        updateTime: mock_update_time
    - expect_exit:
        code: 0

- execute_command:
    label: test describe command help text
    command: auto help-text resources describe --help
    events:
    - expect_stdout: |
        NAME
