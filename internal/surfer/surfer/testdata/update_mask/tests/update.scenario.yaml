title: Update a resource
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test update mask with no fields updated
      - command: auto update-mask resources update $$resource$$ --location=$$location$$
      - stderr: |
          Updated resource [$$resource$$].
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test custom update mask includes only updated fields
      - command: auto update-mask resources update $$resource$$ --location=$$location$$ --labels=foo=bars --validate-only --request-id=my-id
      - stderr: |
          Updated resource [$$resource$$].
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test update mask with no fields updated
      command: auto update-mask resources update $$resource$$ --location=$$location$$
      events:
        - api_call:
            expect_request:
              uri: https://updatemask.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                uid: mock_uid
                updateTime: mock_update_time
        - api_call:
            expect_request:
              uri: https://updatemask.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
              method: PATCH
              headers: {}
              body:
                json:
                  createTime: mock_create_time
                  etag: mock_etag
                  name: mock_name
                  uid: mock_uid
                  updateTime: mock_update_time
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                uid: mock_uid
                updateTime: mock_update_time
        - expect_stderr: |
            Updated resource [$$resource$$].
        - expect_stdout: |
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
        - expect_exit:
            code: 0
  - execute_command:
      label: test custom update mask includes only updated fields
      command: auto update-mask resources update $$resource$$ --location=$$location$$ --labels=foo=bars --validate-only --request-id=my-id
      events:
        - api_call:
            expect_request:
              uri: https://updatemask.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                uid: mock_uid
                updateTime: mock_update_time
        - api_call:
            expect_request:
              uri: https://updatemask.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json&requestId=my-id&updateMask=labels&validateOnly=True
              method: PATCH
              headers: {}
              body:
                json:
                  createTime: mock_create_time
                  etag: mock_etag
                  labels:
                    foo: bars
                  name: mock_name
                  uid: mock_uid
                  updateTime: mock_update_time
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                uid: mock_uid
                updateTime: mock_update_time
        - expect_stderr: |
            Updated resource [$$resource$$].
        - expect_stdout: |
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
        - expect_exit:
            code: 0
