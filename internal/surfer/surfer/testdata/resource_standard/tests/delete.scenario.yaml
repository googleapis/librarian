title: Delete a resource
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test delete standard resource
      - command: auto resource-standard resources delete $$resource$$ --location=$$location$$
      - prompt:
          - message: You are about to delete resource [$$resource$$]
          - input: y
      - stderr: |
          Deleted resource [$$resource$$].
  - execute:
      - label: test delete with query params
      - command: auto resource-standard resources delete $$resource$$ --location=$$location$$ --etag=my-etag --validate-only --request-id=my-id
      - prompt:
          - message: You are about to delete resource [$$resource$$]
          - input: y
      - stderr: |
          Deleted resource [$$resource$$].
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test delete standard resource
      command: auto resource-standard resources delete $$resource$$ --location=$$location$$
      events:
        - expect_prompt_continue:
            message: You are about to delete resource [$$resource$$]
            user_input: y
        - api_call:
            expect_request:
              uri: https://resourcestandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
              method: DELETE
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body: '{}'
        - expect_stderr: |
            Deleted resource [$$resource$$].
        - expect_exit:
            code: 0
  - execute_command:
      label: test delete with query params
      command: auto resource-standard resources delete $$resource$$ --location=$$location$$ --etag=my-etag --validate-only --request-id=my-id
      events:
        - expect_prompt_continue:
            message: You are about to delete resource [$$resource$$]
            user_input: y
        - api_call:
            expect_request:
              uri: https://resourcestandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json&etag=my-etag&requestId=my-id&validateOnly=True
              method: DELETE
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body: '{}'
        - expect_stderr: |
            Deleted resource [$$resource$$].
        - expect_exit:
            code: 0
