title: Delete a resource
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test list with minimal flags
      - command: auto resource-standard resources list --location=$$location$$ --limit=1
      - stdout: |
          ---
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test list with client side flags
      - command: auto resource-standard resources list --location=$$location$$ --limit=2 --page-size=10 --filter="location=$$location$$" --sort-by="name"
      - stderr: |
          WARNING: The following filter keys were not present in any resource : location
          Listed 0 items.
  - execute:
      - label: test list zones with minimal flags
      - command: auto resource-standard zones list --limit=1
      - stdout: |
          ---
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - execute_command:
      label: test list with minimal flags
      command: auto resource-standard resources list --location=$$location$$ --limit=1
      events:
        - api_call:
            expect_request:
              uri: https://resourcestandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                nextPageToken: mock_next_page_token
                resources:
                  - createTime: mock_create_time
                    etag: mock_etag
                    name: mock_name
                    uid: mock_uid
                    updateTime: mock_update_time
                unreachable:
                  - mock_unreachable
        - expect_stdout: |
            ---
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
        - expect_exit:
            code: 0
  - execute_command:
      label: test list with client side flags
      command: auto resource-standard resources list --location=$$location$$ --limit=2 --page-size=10 --filter="location=$$location$$" --sort-by="name"
      events:
        - api_call:
            expect_request:
              uri: https://resourcestandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&pageSize=2
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                nextPageToken: mock_next_page_token
                resources:
                  - createTime: mock_create_time
                    etag: mock_etag
                    name: mock_name
                    uid: mock_uid
                    updateTime: mock_update_time
                unreachable:
                  - mock_unreachable
        - api_call:
            expect_request:
              uri: https://resourcestandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&pageSize=1&pageToken=mock_next_page_token
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                nextPageToken: mock_next_page_token
                resources:
                  - createTime: mock_create_time
                    etag: mock_etag
                    name: mock_name
                    uid: mock_uid
                    updateTime: mock_update_time
                unreachable:
                  - mock_unreachable
        - expect_stderr: |
            WARNING: The following filter keys were not present in any resource : location
            Listed 0 items.
        - expect_exit:
            code: 0
  - execute_command:
      label: test list zones with minimal flags
      command: auto resource-standard zones list --limit=1
      events:
        - api_call:
            expect_request:
              uri: https://resourcestandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/zones?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                nextPageToken: mock_next_page_token
                zones:
                  - createTime: mock_create_time
                    etag: mock_etag
                    name: mock_name
                    uid: mock_uid
                    updateTime: mock_update_time
                unreachable:
                  - mock_unreachable
            repeatable: true
        - expect_stdout: |
            ---
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
        - expect_exit:
            code: 0
