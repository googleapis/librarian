title: Describe a resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test describe standard resource does not include location in hierarchy
  - command: auto resource-standard resources describe $$resource$$ --location=$$location$$
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test describe standard resource does not include region in hierarchy
  - command: auto resource-standard region-resources describe $$resource$$ --region=$$region$$
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
