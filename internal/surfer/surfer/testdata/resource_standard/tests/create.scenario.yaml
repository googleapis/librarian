title: Create a resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test create resource with flags
  - command: auto resource-standard resources create $$resource$$ --location=$$location$$
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create resource with labels
  - command: auto resource-standard resources create $$resource$$ --location=$$location$$
      --labels=foo=bar
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create resource with uri
  - command: auto resource-standard resources create projects/my-project/locations/$$location$$/resources/$$resource$$
      --labels=foo=bar
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create with query params
  - command: auto resource-standard resources create $$resource$$ --location=$$location$$
      --validate-only --request-id=my-id
  - stderr: |
      Created resource [$$resource$$].
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test create resource with flags
    command: auto resource-standard resources create $$resource$$ --location=$$location$$
    events:
    - api_call:
        expect_request:
          uri: https://resourcestandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0

- execute_command:
    label: test create resource with labels
    command: auto resource-standard resources create $$resource$$ --location=$$location$$
      --labels=foo=bar
    events:
    - api_call:
        expect_request:
          uri: https://resourcestandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              labels:
                foo: bar
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0

- execute_command:
    label: test create resource with uri
    command: auto resource-standard resources create projects/my-project/locations/$$location$$/resources/$$resource$$
      --labels=foo=bar
    events:
    - api_call:
        expect_request:
          uri: https://resourcestandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              labels:
                foo: bar
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0

- execute_command:
    label: test create with query params
    command: auto resource-standard resources create $$resource$$ --location=$$location$$
      --validate-only --request-id=my-id
    events:
    - api_call:
        expect_request:
          uri: https://resourcestandard.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&requestId=my-id&resourceId=$$resource$$&validateOnly=True
          method: POST
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0
