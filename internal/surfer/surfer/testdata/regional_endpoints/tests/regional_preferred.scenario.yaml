title: Describe a regional endpoint resource in default mode
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - set_property: regional/endpoint_mode regional-preferred
  - execute:
      - label: test describe global only resource
      - command: auto regional-endpoints-global-only resources describe $$resource$$ --location=$$location$$
      - stderr: |
          Parsed [resource] resource: projects/my-project/locations/$$location$$/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test describe global only resource without location
      - command: auto regional-endpoints-global-only resources describe $$resource$$
      - stderr: |
          Parsed [resource] resource: projects/my-project/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test describe regional preferred
      - command: auto regional-endpoints-regional-supported resources describe $$resource$$ --zone=$$location$$
      - stderr: |
          Parsed [resource] resource: projects/my-project/zones/$$location$$/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test describe regional preferred without zone
      - command: auto regional-endpoints-regional-supported resources describe $$resource$$
      - stderr: |
          Parsed [resource] resource: projects/my-project/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test list regional preferred
      - command: auto regional-endpoints-regional-supported resources list --zone=$$location$$
      - stderr: |
          Parsed [locationOrProjectOrRegionOrZone] resource: projects/my-project/zones/$$location$$
      - stderr: |
          Listed 0 items.
  - execute:
      - label: test describe regional only
      - command: auto regional-endpoints-regional-required resources describe $$resource$$ --region=$$location$$
      - stderr: |
          Parsed [resource] resource: projects/my-project/regions/$$location$$/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
  - execute:
      - label: test describe regional only without region
      - command: auto regional-endpoints-regional-required resources describe $$resource$$
      - stderr: |
          Parsed [resource] resource: projects/my-project/resources/$$resource$$
      - error: '1: Region must be provided.'
  - execute:
      - label: test describe regional only with endpoint location
      - command: auto regional-endpoints-regional-required resources describe $$resource$$ --endpoint-location=$$location$$
      - stderr: |
          Parsed [resource] resource: projects/my-project/resources/$$resource$$
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          uid: mock_uid
          updateTime: mock_update_time
actions:
  - set_property:
      core/project: my-project
  - set_property:
      regional/endpoint_mode: regional-preferred
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test describe global only resource
      command: auto regional-endpoints-global-only resources describe $$resource$$ --location=$$location$$
      events:
        - expect_stderr: |
            Parsed [resource] resource: projects/my-project/locations/$$location$$/resources/$$resource$$
        - api_call:
            expect_request:
              uri: https://regionalendpoints.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                uid: mock_uid
                updateTime: mock_update_time
        - expect_stdout: |
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
        - expect_exit:
            code: 0
