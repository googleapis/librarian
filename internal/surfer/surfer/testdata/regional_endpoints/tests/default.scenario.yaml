title: Describe a regional endpoint resource in default mode
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test describe global only resource
  - command: auto regional-endpoints-global-only resources describe $$resource$$ --location=$$location$$
  - stderr: |
      Parsed [resource] resource: projects/my-project/locations/$$location$$/resources/$$resource$$
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test describe global only resource without location
  - command: auto regional-endpoints-global-only resources describe $$resource$$
  - stderr: |
      Parsed [resource] resource: projects/my-project/resources/$$resource$$
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test describe regional preferred
  - command: auto regional-endpoints-regional-supported resources describe $$resource$$
      --zone=$$location$$
  - stderr: |
      Parsed [resource] resource: projects/my-project/zones/$$location$$/resources/$$resource$$
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test describe regional preferred without zone
  - command: auto regional-endpoints-regional-supported resources describe $$resource$$
  - stderr: |
      Parsed [resource] resource: projects/my-project/resources/$$resource$$
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test list regional preferred
  - command: auto regional-endpoints-regional-supported resources list --zone=$$location$$
  - stderr: |
      Parsed [locationOrProjectOrRegionOrZone] resource: projects/my-project/zones/$$location$$
  - stderr: |
      Listed 0 items.
- execute:
  - label: test describe regional only
  - command: auto regional-endpoints-regional-required resources describe $$resource$$
      --region=$$location$$
  - stderr: |
      Parsed [resource] resource: projects/my-project/regions/$$location$$/resources/$$resource$$
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
- execute:
  - label: test list regional only
  - command: auto regional-endpoints-regional-required resources list --region=$$location$$
  - stderr: |
      Parsed [locationOrProjectOrRegionOrZone] resource: projects/my-project/regions/$$location$$
  - stderr: |
      Listed 0 items.
- execute:
  - label: test create regional only
  - command: auto regional-endpoints-regional-required resources create $$resource$$
      --region=$$location$$
  - stderr: |
      Parsed [resource] resource: projects/my-project/regions/$$location$$/resources/$$resource$$
  - stderr: |
      Create request issued for: [$$resource$$]
  - progress_tracker:
    - message: Waiting for operation [projects/my-project/regions/$$location$$/operations/my-op]
        to complete
    - status: SUCCESS
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test update regional only
  - command: auto regional-endpoints-regional-required resources update $$resource$$
      --region=$$location$$ --labels=foo=bar
  - stderr: |
      Parsed [resource] resource: projects/my-project/regions/$$location$$/resources/$$resource$$
  - stderr: |
      Request issued for: [$$resource$$]
  - progress_tracker:
    - message: Waiting for operation [projects/my-project/regions/$$location$$/operations/my-op]
        to complete
    - status: SUCCESS
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      json:
        createTime: mock_create_time
        etag: mock_etag
        labels:
          foo: bar
        name: mock_name
        uid: mock_uid
        updateTime: mock_update_time
- execute:
  - label: test delete regional only
  - command: auto regional-endpoints-regional-required resources delete $$resource$$
      --region=$$location$$
  - stderr: |
      Parsed [resource] resource: projects/my-project/regions/$$location$$/resources/$$resource$$
  - prompt:
    - message: You are about to delete resource [$$resource$$]
    - input: y
  - stderr: |
      Delete request issued for: [$$resource$$]
  - progress_tracker:
    - message: Waiting for operation [projects/my-project/regions/$$location$$/operations/my-op]
