title: Describe a hidden command
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- execute:
  - label: test hidden resource command is hidden
  - command: auto hidden-feature hidden-resources describe --help
  - stdout: |+
      NAME
          gcloud auto hidden-feature hidden-resources describe - describe
              hiddenResources

      SYNOPSIS
          gcloud auto hidden-feature hidden-resources describe
              (HIDDEN_RESOURCE : --location=LOCATION) [GCLOUD_WIDE_FLAG ...]

      DESCRIPTION
          Describe a hiddenResource

      EXAMPLES
          To describe the hiddenResource, run:

              $ gcloud auto hidden-feature hidden-resources describe

      POSITIONAL ARGUMENTS
           HiddenResource resource - The resource name of the resource within a
           service. The arguments in this group can be used to specify the attributes
           of this resource. (NOTE) Some attributes are not given arguments in this
           group but can be set in other ways.

           To set the project attribute:
            ◆ provide the argument hidden_resource on the command line with a fully
              specified name;
            ◆ provide the argument --project on the command line;
            ◆ set the property core/project.

           This must be specified.

             HIDDEN_RESOURCE
                ID of the hiddenResource or fully qualified identifier for the
                hiddenResource.

                To set the hidden_resource attribute:
                ▸ provide the argument hidden_resource on the command line.

                This positional argument must be specified if any of the other
                arguments in this group are specified.

             --location=LOCATION
                The location id of the hiddenResource resource.

                To set the location attribute:
                ▸ provide the argument hidden_resource on the command line with a
                  fully specified name;
                ▸ provide the argument --location on the command line.

      GCLOUD WIDE FLAGS
          These flags are available to all commands: --access-token-file, --account,
          --billing-project, --configuration, --flags-file, --flatten, --format,
          --help, --impersonate-service-account, --log-http, --project, --quiet,
          --trace-token, --user-output-enabled, --verbosity.

          Run $ gcloud help for details.

      API REFERENCE
          This command uses the hiddenfeature/v1 API. The full documentation for this
          API can be found at:

      NOTES
          This command is an internal implementation detail and may change or
          disappear without notice.

  - error: '1: 0'
