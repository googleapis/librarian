title: create cyclic messages
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test create failed due to non-struct type
  - command: auto cyclicmessages resources create $$resource$$ --location=$$location$$
      --struct=100 --async
  - stderr: |
      ERROR: (gcloud.auto.cyclicmessages.resources.create) argument --struct: Bad value [100]: Expecting map format i.e. {"foo": "bar"}
      Usage: gcloud auto cyclicmessages resources create (RESOURCE : --location=LOCATION) [optional flags]
        optional flags may be  --async | --help | --labels | --location |
                               --map-struct | --message-repeated-struct |
                               --message-struct | --non-cyclic-name |
                               --repeated-struct | --request-id | --struct |
                               --validate-only | --value

      For detailed information on this command and its flags, run:
        gcloud auto cyclicmessages resources create --help
  - error: '1: argument --struct: Bad value [100]: Expecting map format i.e. {"foo":
      "bar"}'
- execute:
  - label: test create struct fields
  - command: auto cyclicmessages resources create $$resource$$ --location=$$location$$
      --struct='{"foo":"bar","baz":[1,2,3]}' --map-struct='{"key":{"foo":"bar","baz":[4,5,6]}}'
      --async
  - stderr: |
      Create request issued for: [$$resource$$]
      Check operation [projects/$$PROJECT_ID$$/locations/$$UNIVERSE_REGION$$/operations/mock_operation] for status.
- execute:
  - label: test create repeated struct fields
  - command: auto cyclicmessages resources create $$resource$$ --location=$$location$$
      --repeated-struct='[{"foo":"bar","baz":[1,2,3]}]' --message-struct='[{"struct":{"foo":"bar","baz":[4,5,6]}}]'
      --message-repeated-struct='[{"struct":[{"foo":"bar","bar":"baz"}]}]' --async
  - stderr: |
      Create request issued for: [$$resource$$]
      Check operation [projects/$$PROJECT_ID$$/locations/$$UNIVERSE_REGION$$/operations/mock_operation] for status.
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource
- execute_command:
    label: test create failed due to non-struct type
    command: auto cyclicmessages resources create $$resource$$ --location=$$location$$
      --struct=100 --async
    events:
    - expect_stderr: |
        ERROR: (gcloud.auto.cyclicmessages.resources.create) argument --struct: Bad value [100]: Expecting map format i.e. {"foo": "bar"}
        Usage: gcloud auto cyclicmessages resources create (RESOURCE : --location=LOCATION) [optional flags]
          optional flags may be  --async | --help | --labels | --location |
                                 --map-struct | --message-repeated-struct |
                                 --message-struct | --non-cyclic-name |
                                 --repeated-struct | --request-id | --struct |
                                 --validate-only | --value

        For detailed information on this command and its flags, run:
          gcloud auto cyclicmessages resources create --help
    - expect_exit:
        code: 1
        message: 'argument --struct: Bad value [100]: Expecting map format i.e. {"foo":
          "bar"}'
- execute_command:
    label: test create struct fields
    command: auto cyclicmessages resources create $$resource$$ --location=$$location$$
      --struct='{"foo":"bar","baz":[1,2,3]}' --map-struct='{"key":{"foo":"bar","baz":[4,5,6]}}'
      --async
    events:
    - api_call:
        expect_request:
          uri: https://cyclicmessages.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              struct:
                baz:
                - 1
                - 2
                - 3
                foo: bar
              mapStruct:
                key:
                  foo: bar
                  baz:
                  - 4
                  - 5
                  - 6
        return_response:
          status: 200
          headers: {}
          body:
            done: true
            name: projects/$$PROJECT_ID$$/locations/$$UNIVERSE_REGION$$/operations/mock_operation
    - expect_stderr: |
        Create request issued for: [$$resource$$]
        Check operation [projects/$$PROJECT_ID$$/locations/$$UNIVERSE_REGION$$/operations/mock_operation] for status.
    - expect_exit:
        code: 0
- execute_command:
    label: test create repeated struct fields
    command: auto cyclicmessages resources create $$resource$$ --location=$$location$$
      --repeated-struct='[{"foo":"bar","baz":[1,2,3]}]' --message-struct='[{"struct":{"foo":"bar","baz":[4,5,6]}}]'
      --message-repeated-struct='[{"struct":[{"foo":"bar","bar":"baz"}]}]' --async
    events:
    - api_call:
        expect_request:
          uri: https://cyclicmessages.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              repeatedStruct:
              - baz:
                - 1
                - 2
                - 3
                foo: bar
              messageStruct:
              - struct:
                  foo: bar
                  baz:
                  - 4
                  - 5
                  - 6
              messageRepeatedStruct:
              - struct:
                - foo: bar
                  bar: baz
        return_response:
          status: 200
          headers: {}
          body:
            done: true
            name: projects/$$PROJECT_ID$$/locations/$$UNIVERSE_REGION$$/operations/mock_operation
    - expect_stderr: |
        Create request issued for: [$$resource$$]
        Check operation [projects/$$PROJECT_ID$$/locations/$$UNIVERSE_REGION$$/operations/mock_operation] for status.
    - expect_exit:
        code: 0
