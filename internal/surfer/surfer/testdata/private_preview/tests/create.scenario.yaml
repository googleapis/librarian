title: Create a resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test create private preview method
  - command: auto private-preview resources create $$resource$$ --location=$$location$$
      --public-proto-message-field=foo --public-proto-message-private-field=bar --public-proto-message-private-field-multiple-annotations=baz
      --public-proto-message-enum=one --public-proto-message-private-enum=three --public-proto-message-private-enum-value=six
      --private-proto-message-public-field=qux --public-service-message-field=foo
      --public-service-message-private-field=bar --public-service-message-private-field-multiple-annotations=baz
      --public-service-message-enum=one --public-service-message-private-enum=one
      --public-service-message-private-enum-value=six --private-service-config-message-public-field=qux
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: help text for hidden choice
  - command: auto private-preview resources create --help
  - stdout: |+
      NAME
          gcloud auto private-preview resources create - create resources

      SYNOPSIS
          gcloud auto private-preview resources create
              (RESOURCE : --location=LOCATION) [--labels=[LABELS,...]]
              [--request-id=REQUEST_ID] [--validate-only]
              [--private-proto-message-public-field=PRIVATE_PROTO_MESSAGE_PUBLIC_FIELD --public-proto-message-enum=PUBLIC_PROTO_MESSAGE_ENUM --public-proto-message-field=PUBLIC_PROTO_MESSAGE_FIELD --public-proto-message-private-enum=PUBLIC_PROTO_MESSAGE_PRIVATE_ENUM --public-proto-message-private-enum-value=PUBLIC_PROTO_MESSAGE_PRIVATE_ENUM_VALUE --public-proto-message-private-field=PUBLIC_PROTO_MESSAGE_PRIVATE_FIELD --public-proto-message-private-field-multiple-annotations=PUBLIC_PROTO_MESSAGE_PRIVATE_FIELD_MULTIPLE_ANNOTATIONS]
              [--private-service-config-message-public-field=PRIVATE_SERVICE_CONFIG_MESSAGE_PUBLIC_FIELD --public-service-message-enum=PUBLIC_SERVICE_MESSAGE_ENUM --public-service-message-field=PUBLIC_SERVICE_MESSAGE_FIELD --public-service-message-private-enum=PUBLIC_SERVICE_MESSAGE_PRIVATE_ENUM --public-service-message-private-enum-value=PUBLIC_SERVICE_MESSAGE_PRIVATE_ENUM_VALUE --public-service-message-private-field=PUBLIC_SERVICE_MESSAGE_PRIVATE_FIELD --public-service-message-private-field-multiple-annotations=PUBLIC_SERVICE_MESSAGE_PRIVATE_FIELD_MULTIPLE_ANNOTATIONS]
              [GCLOUD_WIDE_FLAG ...]

      DESCRIPTION
          Create a resource

      EXAMPLES
          To create the resource, run:

              $ gcloud auto private-preview resources create

      POSITIONAL ARGUMENTS
           Resource resource - Identifier. Resource name. The arguments in this group
           can be used to specify the attributes of this resource. (NOTE) Some
           attributes are not given arguments in this group but can be set in other
           ways.

           To set the project attribute:
            ◆ provide the argument resource on the command line with a fully
              specified name;
            ◆ provide the argument --project on the command line;
            ◆ set the property core/project.

           This must be specified.

             RESOURCE
                ID of the resource or fully qualified identifier for the resource.

                To set the resource attribute:
                ▸ provide the argument resource on the command line.

                This positional argument must be specified if any of the other
                arguments in this group are specified.

             --location=LOCATION
                The location id of the resource resource.

                To set the location attribute:
                ▸ provide the argument resource on the command line with a fully
                  specified name;
                ▸ provide the argument --location on the command line.

      FLAGS
           --labels=[LABELS,...]
              The labels on the resource, which can be used for categorization.
              similar to Kubernetes resource labels.

               KEY
                  Keys must start with a lowercase character and contain only hyphens
                  (-), underscores (_), lowercase characters, and numbers.

               VALUE
                  Values must contain only hyphens (-), underscores (_), lowercase
                  characters, and numbers.

              Shorthand Example:

                  --labels=string=string

              JSON Example:

                  --labels='{"string": "string"}'

              File Example:

                  --labels=path_to_file.(yaml|json)

           --request-id=REQUEST_ID
              An optional request ID to identify requests. Specify a unique request
              ID so that if you must retry your request, the server will know to
              ignore the request if it has already been completed. The server will
              guarantee that for at least 60 minutes since the first request.

              For example, consider a situation where you make an initial request and
              the request times out. If you make the request again with the same
              request ID, the server can check if original operation with the same
              request ID was received, and if so, will ignore the second request.
              This prevents clients from accidentally creating duplicate commitments.

              The request ID must be a valid UUID with the exception that zero UUID
              is not supported (00000000-0000-0000-0000-000000000000).

           --validate-only
              If "validate_only" is set to true, the service will try to validate
              that this request would succeed, but will not actually make changes.

           Public message where the field is private in proto annotation.

           Private message in service config.

           --private-proto-message-public-field=PRIVATE_PROTO_MESSAGE_PUBLIC_FIELD
              Public field that should be private due to message.

           --public-proto-message-enum=PUBLIC_PROTO_MESSAGE_ENUM
              Always visible enum. PUBLIC_PROTO_MESSAGE_ENUM must be one of:

               one
                  Enum value.
               two
                  Enum value.

           --public-proto-message-field=PUBLIC_PROTO_MESSAGE_FIELD
              Always visible field.

           --public-proto-message-private-enum=PUBLIC_PROTO_MESSAGE_PRIVATE_ENUM
              Private enum. PUBLIC_PROTO_MESSAGE_PRIVATE_ENUM must be one of:

               four
                  Enum value.
               three
                  Enum value.

           --public-proto-message-private-enum-value=PUBLIC_PROTO_MESSAGE_PRIVATE_ENUM_VALUE
              Private enum value. PUBLIC_PROTO_MESSAGE_PRIVATE_ENUM_VALUE must be
              (only one value is supported):

               five
                  Enum value.

           --public-proto-message-private-field=PUBLIC_PROTO_MESSAGE_PRIVATE_FIELD
              Private field.

           --public-proto-message-private-field-multiple-annotations=PUBLIC_PROTO_MESSAGE_PRIVATE_FIELD_MULTIPLE_ANNOTATIONS
              Private field with multiple visibility annotations.

           Public message where the field is private in service config.

           Private message in service config.

           --private-service-config-message-public-field=PRIVATE_SERVICE_CONFIG_MESSAGE_PUBLIC_FIELD
              Public field that should be private due to message.

           --public-service-message-enum=PUBLIC_SERVICE_MESSAGE_ENUM
              Always visible enum. PUBLIC_SERVICE_MESSAGE_ENUM must be one of:

               one
                  Enum value.
               two
                  Enum value.

           --public-service-message-field=PUBLIC_SERVICE_MESSAGE_FIELD
              Always visible field.

           --public-service-message-private-enum=PUBLIC_SERVICE_MESSAGE_PRIVATE_ENUM
              Private enum. PUBLIC_SERVICE_MESSAGE_PRIVATE_ENUM must be one of:

               one
                  Enum value.
               two
                  Enum value.

           --public-service-message-private-enum-value=PUBLIC_SERVICE_MESSAGE_PRIVATE_ENUM_VALUE
              Private enum value. PUBLIC_SERVICE_MESSAGE_PRIVATE_ENUM_VALUE must be
              (only one value is supported):

               five
                  Enum value.

           --public-service-message-private-field=PUBLIC_SERVICE_MESSAGE_PRIVATE_FIELD
              Private field.

           --public-service-message-private-field-multiple-annotations=PUBLIC_SERVICE_MESSAGE_PRIVATE_FIELD_MULTIPLE_ANNOTATIONS
              Private field with multiple visibility annotations.

      GCLOUD WIDE FLAGS
          These flags are available to all commands: --access-token-file, --account,
          --billing-project, --configuration, --flags-file, --flatten, --format,
          --help, --impersonate-service-account, --log-http, --project, --quiet,
          --trace-token, --user-output-enabled, --verbosity.

          Run $ gcloud help for details.

      API REFERENCE
          This command uses the privatepreview/v1 API. The full documentation for
          this API can be found at:

      NOTES
          This command is an internal implementation detail and may change or
          disappear without notice.

  - error: '1: 0'
- execute:
  - label: suggestion for invalid choice resembling hidden one
  - command: auto private-preview resources create $$resource$$ --location=$$location$$
      --public-service-message-private-enum-value=siZ
  - stderr: |
      ERROR: (gcloud.auto.private-preview.resources.create) argument --public-service-message-private-enum-value: Invalid choice: 'siz'.

      Valid choices are [five].
  - error: |-
      1: argument --public-service-message-private-enum-value: Invalid choice: 'siz'.

      Valid choices are [five].
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource
- execute_command:
    label: test create private preview method
    command: auto private-preview resources create $$resource$$ --location=$$location$$
      --public-proto-message-field=foo --public-proto-message-private-field=bar --public-proto-message-private-field-multiple-annotations=baz
      --public-proto-message-enum=one --public-proto-message-private-enum=three --public-proto-message-private-enum-value=six
      --private-proto-message-public-field=qux --public-service-message-field=foo
      --public-service-message-private-field=bar --public-service-message-private-field-multiple-annotations=baz
      --public-service-message-enum=one --public-service-message-private-enum=one
      --public-service-message-private-enum-value=six --private-service-config-message-public-field=qux
    events:
    - api_call:
        expect_request:
          uri: https://privatepreview.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body:
            json:
              publicProtoMessage:
                privateEnum: THREE
                privateEnumValue: SIX
                privateField: bar
                privateFieldMultipleAnnotations: baz
                privateProtoMessage:
                  publicField: qux
                publicEnum: ONE
                publicField: foo
              publicServiceMessage:
                privateEnum: ONE
                privateEnumValue: SIX
                privateField: bar
                privateFieldMultipleAnnotations: baz
                privateServiceConfigMessage:
                  publicField: qux
                publicEnum: ONE
                publicField: foo
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0
