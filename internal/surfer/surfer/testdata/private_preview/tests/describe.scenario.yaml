title: Describe a resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test get method in private preview service
  - command: auto private-preview resources describe $$resource$$ --location=$$location$$
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: region
    value: my-region
- define_reference:
    reference: zone
    value: my-zone
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test get method in private preview service
    command: auto private-preview resources describe $$resource$$ --location=$$location$$
    events:
    - api_call:
        expect_request:
          uri: https://privatepreview.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stdout: |
        createTime: mock_create_time
        etag: mock_etag
        name: mock_name
        uid: mock_uid
        updateTime: mock_update_time
    - expect_exit:
        code: 0
