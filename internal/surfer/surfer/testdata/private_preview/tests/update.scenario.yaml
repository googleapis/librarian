title: Update a resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test update with private preview flags
  - command: auto private-preview resources update $$resource$$ --location=$$location$$
      --public-proto-message-field=foo --public-proto-message-private-field=bar --public-proto-message-private-field-multiple-annotations=baz
      --public-proto-message-enum=one --public-proto-message-private-enum=four --public-proto-message-private-enum-value=six
      --private-proto-message-public-field=qux --public-service-message-field=foo
      --public-service-message-private-field=bar --public-service-message-private-field-multiple-annotations=baz
      --public-service-message-enum=one --public-service-message-private-enum=two
      --public-service-message-private-enum-value=six --private-service-config-message-public-field=qux
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      uid: mock_uid
      updateTime: mock_update_time
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test update with private preview flags
    command: auto private-preview resources update $$resource$$ --location=$$location$$
      --public-proto-message-field=foo --public-proto-message-private-field=bar --public-proto-message-private-field-multiple-annotations=baz
      --public-proto-message-enum=one --public-proto-message-private-enum=four --public-proto-message-private-enum-value=six
      --private-proto-message-public-field=qux --public-service-message-field=foo
      --public-service-message-private-field=bar --public-service-message-private-field-multiple-annotations=baz
      --public-service-message-enum=one --public-service-message-private-enum=two
      --public-service-message-private-enum-value=six --private-service-config-message-public-field=qux
    events:
    - api_call:
        expect_request:
          uri: https://privatepreview.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - api_call:
        expect_request:
          uri: https://privatepreview.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json&updateMask=%2A
          method: PATCH
          headers: {}
          body:
            json:
              publicProtoMessage:
                privateEnum: FOUR
                privateEnumValue: SIX
                privateField: bar
                privateFieldMultipleAnnotations: baz
                privateProtoMessage:
                  publicField: qux
                publicEnum: ONE
                publicField: foo
              publicServiceMessage:
                privateEnum: TWO
                privateEnumValue: SIX
                privateField: bar
                privateFieldMultipleAnnotations: baz
                privateServiceConfigMessage:
                  publicField: qux
                publicEnum: ONE
                publicField: foo
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Updated resource [$$resource$$].
    - expect_stdout: |
        createTime: mock_create_time
        etag: mock_etag
        name: mock_name
        uid: mock_uid
        updateTime: mock_update_time
    - expect_exit:
        code: 0
