title: Update a resource with operations
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test update async
  - command: auto method-operations resources update $$resource$$ --location=$$location$$
      --labels=foo=bar --async
  - stderr: |
      Request issued for: [$$resource$$]
      Check operation [$$operation$$] for status.
      Updated resource [$$resource$$].
  - stdout: |
      done: true
      name: $$operation$$
- execute:
  - label: test update sync
  - command: auto method-operations resources update $$resource$$ --location=$$location$$
      --labels=foo=bar
  - stderr: |
      Request issued for: [$$resource$$]
  - stderr: |
      Updated resource [$$resource$$].
  - stdout: |
      createTime: mock_create_time
      etag: mock_etag
      name: mock_name
      updateTime: mock_update_time
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test update async
    command: auto method-operations resources update $$resource$$ --location=$$location$$
      --labels=foo=bar --async
    events:
    - api_call:
        expect_request:
          uri: https://methodoperations.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            updateTime: mock_update_time
    - api_call:
        expect_request:
          uri: https://methodoperations.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json&updateMask=%2A
          method: PATCH
          headers: {}
          body:
            json:
              createTime: mock_create_time
              etag: mock_etag
              labels:
                foo: bar
              name: mock_name
              updateTime: mock_update_time
        return_response:
          status: 200
          headers: {}
          body:
            done: true
            name: projects/fake-project/locations/us-central1/operations/mock_operation
        poll_operation: true
    - expect_stderr: |
        Request issued for: [$$resource$$]
        Check operation [$$operation$$] for status.
        Updated resource [$$resource$$].
    - expect_stdout: |
        done: true
        name: $$operation$$
    - expect_exit:
        code: 0

- execute_command:
    label: test update sync
    command: auto method-operations resources update $$resource$$ --location=$$location$$
      --labels=foo=bar
    events:
    - api_call:
        expect_request:
          uri: https://methodoperations.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            updateTime: mock_update_time
    - api_call:
        expect_request:
          uri: https://methodoperations.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json&updateMask=%2A
          method: PATCH
          headers: {}
          body:
            json:
              createTime: mock_create_time
              etag: mock_etag
              labels:
                foo: bar
              name: mock_name
              updateTime: mock_update_time
        return_response:
          status: 200
          headers: {}
          body:
            done: true
            name: projects/fake-project/locations/us-central1/operations/mock_operation
    - expect_stderr: |
        Request issued for: [$$resource$$]
    - api_call:
        expect_request:
          uri: https://methodoperations.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
          method: GET
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            updateTime: mock_update_time
    - expect_stderr: |
        Updated resource [$$resource$$].
