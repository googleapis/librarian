title: Wait operation
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test create minimal
      - command: auto method-operations operations wait my-operation --location=$$location$$
      - progress_tracker:
          - message: Waiting for operation [projects/my-project/locations/$$location$$/operations/my-operation] to complete
          - status: SUCCESS
      - stdout: |
          done: true
          name: $$operation$$
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - execute_command:
      label: test create minimal
      command: auto method-operations operations wait my-operation --location=$$location$$
      events:
        - api_call:
            expect_request:
              uri: https://methodoperations.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/operations/my-operation?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                done: true
                name: projects/fake-project/locations/us-central1/operations/mock_operation
            poll_operation: true
        - expect_progress_tracker:
            message: Waiting for operation [projects/my-project/locations/$$location$$/operations/my-operation] to complete
            status: SUCCESS
        - expect_stdout: |
            done: true
            name: $$operation$$
        - expect_exit:
            code: 0
