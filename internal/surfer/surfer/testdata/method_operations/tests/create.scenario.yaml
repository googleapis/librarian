title: Create resource with operations
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test create resource async
      - command: auto method-operations resources create $$resource$$ --location=$$location$$ --async
      - stderr: |
          Create request issued for: [$$resource$$]
          Check operation [$$operation$$] for status.
  - execute:
      - label: test create resource sync
      - command: auto method-operations resources create $$resource$$ --location=$$location$$
      - stderr: |
          Create request issued for: [$$resource$$]
      - stderr: |
          Created resource [$$resource$$].
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test create resource async
      command: auto method-operations resources create $$resource$$ --location=$$location$$ --async
      events:
        - api_call:
            expect_request:
              uri: https://methodoperations.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
              method: POST
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                done: true
                name: projects/fake-project/locations/us-central1/operations/mock_operation
            poll_operation: true
        - expect_stderr: |
            Create request issued for: [$$resource$$]
            Check operation [$$operation$$] for status.
        - expect_exit:
            code: 0
  - execute_command:
      label: test create resource sync
      command: auto method-operations resources create $$resource$$ --location=$$location$$
      events:
        - api_call:
            expect_request:
              uri: https://methodoperations.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
              method: POST
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                done: true
                name: projects/fake-project/locations/us-central1/operations/mock_operation
        - expect_stderr: |
            Create request issued for: [$$resource$$]
        - api_call:
            expect_request:
              uri: https://methodoperations.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
              method: GET
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                createTime: mock_create_time
                etag: mock_etag
                name: mock_name
                updateTime: mock_update_time
        - expect_stderr: |
            Created resource [$$resource$$].
        - expect_exit:
            code: 0
