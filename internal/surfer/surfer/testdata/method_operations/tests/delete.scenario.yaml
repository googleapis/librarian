title: Delete a resource with operations
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test delete async
      - command: auto method-operations resources delete $$resource$$ --location=$$location$$ --async
      - prompt:
          - message: You are about to delete resource [$$resource$$]
          - input: y
      - stderr: |
          Delete request issued for: [$$resource$$]
          Check operation [$$operation$$] for status.
  - execute:
      - label: test delete sync
      - command: auto method-operations resources delete $$resource$$ --location=$$location$$
      - prompt:
          - message: You are about to delete resource [$$resource$$]
          - input: y
      - stderr: |
          Delete request issued for: [$$resource$$]
          Deleted resource [$$resource$$].
actions:
  - set_property:
      core/project: my-project
  - define_reference:
      reference: location
      value: us-east1
  - define_reference:
      reference: resource
      value: my-resource
  - execute_command:
      label: test delete async
      command: auto method-operations resources delete $$resource$$ --location=$$location$$ --async
      events:
        - expect_prompt_continue:
            message: You are about to delete resource [$$resource$$]
            user_input: y
        - api_call:
            expect_request:
              uri: https://methodoperations.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
              method: DELETE
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                done: true
                name: projects/fake-project/locations/us-central1/operations/mock_operation
            poll_operation: true
        - expect_stderr: |
            Delete request issued for: [$$resource$$]
            Check operation [$$operation$$] for status.
        - expect_exit:
            code: 0
  - execute_command:
      label: test delete sync
      command: auto method-operations resources delete $$resource$$ --location=$$location$$
      events:
        - expect_prompt_continue:
            message: You are about to delete resource [$$resource$$]
            user_input: y
        - api_call:
            expect_request:
              uri: https://methodoperations.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources/$$resource$$?alt=json
              method: DELETE
              headers: {}
              body: null
            return_response:
              status: 200
              headers: {}
              body:
                done: true
                name: projects/fake-project/locations/us-central1/operations/mock_operation
        - expect_stderr: |
            Delete request issued for: [$$resource$$]
            Deleted resource [$$resource$$].
        - expect_exit:
            code: 0
