title: Create a resource reference
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test create minimal
  - command: auto resource-reference resources create $$resource$$ --location=$$location$$
  - stderr: |
      Parsed [multiReference] resource: None
      Parsed [anotherMultiReference] resource: None
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create with no references
  - command: auto resource-reference resources create $$resource$$ --location=$$location$$
  - stderr: |
      Parsed [multiReference] resource: None
      Parsed [anotherMultiReference] resource: None
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create with shorthand references
  - command: auto resource-reference resources create $$resource$$ --reference=my-reference
      --another-reference=my-another --location=$$location$$ --labels=foo=bar
  - stderr: |
      Parsed [multiReference] resource: None
      Parsed [anotherMultiReference] resource: None
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create with full uri references
  - command: auto resource-reference resources create $$resource$$ --location=$$location$$
      --reference=projects/my-project/references/my-ref --another-reference=projects/my-other-project/locations/another-location/anothers/another-ref
      --labels=foo=bar
  - stderr: |
      Parsed [multiReference] resource: None
      Parsed [anotherMultiReference] resource: None
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create with multitype shorthand references
  - command: auto resource-reference resources create $$resource$$ --multitype-reference=my-multitype
      --another-multitype-reference=my-another-multitype --location=$$location$$ --labels=foo=bar
