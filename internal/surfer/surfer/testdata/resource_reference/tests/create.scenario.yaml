      Created resource [$$resource$$].
- execute:
  - label: test create with multitype full uri references
  - command: auto resource-reference resources create $$resource$$ --location=$$location$$
      --multitype-reference=projects/my-other-project/multiReferences/my-multitype
      --another-multitype-reference=projects/another-project/locations/another-location/anotherMultiReferences/my-another-multitype
      --labels=foo=bar
  - stderr: |
      Parsed [multiReference] resource: projects/my-other-project/multiReferences/my-multitype
      Parsed [anotherMultiReference] resource: projects/another-project/locations/another-location/anotherMultiReferences/my-another-multitype
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create with singleton shorthand
  - command: auto resource-reference resources create $$resource$$ --location=$$location$$
      --singleton-reference=some-random-singleton --global-reference=my-global-ref
      --parent=my-parent --labels=foo=bar
  - stderr: |
      Parsed [multiReference] resource: None
      Parsed [anotherMultiReference] resource: None
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create with singleton full uri
  - command: auto resource-reference resources create $$resource$$ --location=$$location$$
      --singleton-reference=some-random-singleton --global-reference=projects/another-project/parents/my-parent/global/globalReferences/global-ref
      --labels=foo=bar
  - stderr: |
      Parsed [multiReference] resource: None
      Parsed [anotherMultiReference] resource: None
  - stderr: |
      Created resource [$$resource$$].
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource

- execute_command:
    label: test create minimal
    command: auto resource-reference resources create $$resource$$ --location=$$location$$
    events:
    - expect_stderr: |
        Parsed [multiReference] resource: None
        Parsed [anotherMultiReference] resource: None
    - api_call:
        expect_request:
          uri: https://resourcereference.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            anotherMultitypeReference: mock_another_multitype_reference
            anotherReference: mock_another_reference
            createTime: mock_create_time
            etag: mock_etag
            globalReference: mock_global_reference
            multitypeReference: mock_multitype_reference
            name: mock_name
            reference: mock_reference
            singletonReference: mock_singleton_reference
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0

