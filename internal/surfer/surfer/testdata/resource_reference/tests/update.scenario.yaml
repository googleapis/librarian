title: Update a resource reference
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test update reference shorthand
      - command: auto resource-reference resources update $$resource$$ --location=$$location$$ --reference=my-reference
      - stderr: |
          Parsed [multiReference] resource: None
          Parsed [anotherMultiReference] resource: None
      - stderr: |
          Updated resource [$$resource$$].
      - stdout: |
          anotherMultitypeReference: mock_another_multitype_reference
          anotherReference: mock_another_reference
          createTime: mock_create_time
          etag: mock_etag
          globalReference: mock_global_reference
          multitypeReference: mock_multitype_reference
          name: mock_name
          reference: mock_reference
          singletonReference: mock_singleton_reference
          updateTime: mock_update_time
  - execute:
      - label: test update with shorthand full uri
      - command: auto resource-reference resources update $$resource$$ --location=$$location$$ --reference=projects/my-project/references/my-ref
      - stderr: |
          Parsed [multiReference] resource: None
          Parsed [anotherMultiReference] resource: None
      - stderr: |
          Updated resource [$$resource$$].
      - stdout: |
          anotherMultitypeReference: mock_another_multitype_reference
          anotherReference: mock_another_reference
          createTime: mock_create_time
          etag: mock_etag
          globalReference: mock_global_reference
          multitypeReference: mock_multitype_reference
          name: mock_name
          reference: mock_reference
          singletonReference: mock_singleton_reference
          updateTime: mock_update_time
  - execute:
