title: Create a multitype resource
release_tracks: [GA]
summary:
# This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
- set_property: core/project my-project
- execute:
  - label: test create no fields specified
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create enum field
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
      --my-enum=one
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create full inner message
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
      --my-message-string-field=my-string --my-message-int-field=123 --no-my-message-bool-field
      --my-message-file-field-from-file=my-file.txt
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create partial inner message
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
      --my-message-string-field=my-string
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create repeated field
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
      --repeated-field=foo,bar
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create repeated field
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
      --repeated-file-field-from-file=my-file.txt,my-file.txt
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create repeated message and map field short hand
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
      --repeated-message=stringField=my-string,intField=123,boolField=true,fileFieldFromFile=my-file.txt
      --repeated-message=stringField=my-other-string --map-field=key1=1,key2=2 --map-output-only-message=key1,key2,key3={}
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create repeated message and map field json
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
      --repeated-message='[{"stringField":"my-string","intField":123,"boolField":true,"fileFieldFromFile":"my-file.txt"},
      {"stringField":"my-other-string"}]' --map-field='{"key1":1,"key2":2}' --map-output-only-message='{"key1":{}}'
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test specify empty message field
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
      --my-message-empty={}
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test specify empty message field shorthand
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
      --my-message-empty=''
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create message with root level json
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
      --my-message='{"stringField":"my-string","intField":123,"boolField":true,"fileFieldFromFile":"my-file.txt","nestedMessage":{"stringField":"my-string"},"emptyMessage":{}}'
  - stderr: |
      Created resource [$$resource$$].
- execute:
  - label: test create message with root level short hand
  - command: auto field-complex-types resources create $$resource$$ --location=$$location$$
      --my-message='stringField=my-string,intField=123,boolField=true,fileFieldFromFile=my-file.txt,nestedMessage={stringField=my-string}'
  - stderr: |
      Created resource [$$resource$$].
actions:
- set_property:
    core/project: my-project
- define_reference:
    reference: location
    value: us-east1
- define_reference:
    reference: resource
    value: my-resource
- write_file:
    path: my-file.txt
    contents: hello world

- execute_command:
    label: test create no fields specified
    command: auto field-complex-types resources create $$resource$$ --location=$$location$$
    events:
    - api_call:
        expect_request:
          uri: https://fieldcomplextypes.$$UNIVERSE_DOMAIN$$/v1/projects/my-project/locations/$$location$$/resources?alt=json&resourceId=$$resource$$
          method: POST
          headers: {}
          body: null
        return_response:
          status: 200
          headers: {}
          body:
            createTime: mock_create_time
            etag: mock_etag
            name: mock_name
            repeatedField:
            - mock_repeated_field
            repeatedFileField:
            - mock_repeated_file_field
            repeatedMessage:
            - boolField: false
              fileField: mock_file_field
              stringField: mock_string_field
            uid: mock_uid
            updateTime: mock_update_time
    - expect_stderr: |
        Created resource [$$resource$$].
    - expect_exit:
        code: 0

