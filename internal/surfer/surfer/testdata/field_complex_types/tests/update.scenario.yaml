title: Update a complex field types
release_tracks: [GA]
summary:
  # This summary is generated by http://go/gcloud-scenario-tests on update and should not be edited.
  - set_property: core/project my-project
  - execute:
      - label: test update enum value
      - command: auto field-complex-types resources update $$resource$$ --location=$$location$$ --my-enum=one
      - stderr: |
          Updated resource [$$resource$$].
      - stdout: |
          createTime: mock_create_time
          etag: mock_etag
          name: mock_name
          repeatedField:
          - mock_repeated_field
          repeatedFileField:
          - mock_repeated_file_field
          repeatedMessage:
          - boolField: false
            fileField: mock_file_field
            stringField: mock_string_field
          uid: mock_uid
          updateTime: mock_update_time
