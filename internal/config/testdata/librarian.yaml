language: rust
sources:
  conformance:
    commit: 1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b
    sha256: f572d396fae9206628714fb2ce00f72e94f2258f
  discovery:
    commit: b27c80574e918a7e2a36eb21864d1d2e45b8c032
    sha256: 67c8d3792f0ebf5f0582dce675c379d0f486604eb0143814c79e788954aa1212
  googleapis:
    commit: 9fcfbea0aa5b50fa22e190faceb073d74504172b
    sha256: 81e6057ffd85154af5268c2c3c8f2408745ca0f7fa03d43c68f4847f31eb5f98
  protobuf:
    commit: 4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b
    sha256: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
    subpath: src
  showcase:
    commit: 846ec3b86067d1480b43c3b869e89aacc15dfd7d
    sha256: c43e9c0e3f4ad9aa541f73b06b5e067915277eb36cbeb9e8a3882f8677d5eec4
default:
  output: src/generated/
  release_level: stable
  tag_format: '{name}/v{version}'
  rust:
    package_dependencies:
      - name: bytes
        package: bytes
        force_used: true
      - name: serde
        package: serde
        force_used: true
    disabled_rustdoc_warnings:
      - redundant_explicit_links
      - broken_intra_doc_links
libraries:
  - name: google-cloud-secretmanager-v1
    version: 1.2.3
    apis:
      - path: google/cloud/secretmanager/v1
  - name: google-cloud-storage-v2
    version: 2.3.4
    apis:
      - path: google/cloud/storage/v2
    roots:
      - googleapis
    rust:
      disabled_rustdoc_warnings:
        - rustdoc::bare_urls
      documentation_overrides:
        - id: .google.cloud.orgpolicy.v1.Policy.ListPolicy
          match: 'Ancestry subtrees must be in one of the following formats:'
          replace: " \nAncestry subtrees must be in one of the following formats:"
        - id: .google.cloud.orgpolicy.v1.Policy.ListPolicy
          match: The `supports_under` field of the associated `Constraint`  defines whether
          replace: " \nThe `supports_under` field of the associated `Constraint`  defines whether"
  - name: google-cloud-storage
    version: 1.4.0
    veneer: true
    rust:
      modules:
        - has_veneer: true
          included_ids:
            - .google.storage.v2.Storage.GetBucket
            - .google.storage.v2.Storage.ListBuckets
          output: src/storage/src/generated/gapic
          routing_required: true
          service_config: google/storage/v2/storage_v2.yaml
          api_path: ""
          template: grpc-client
        - output: src/storage/src/generated/protos/storage
          api_path: ""
          template: prost
