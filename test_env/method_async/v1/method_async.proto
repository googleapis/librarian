service MethodAsync {
  option (google.api.default_host) = "methodasync.googleapis.com";

  // Retrieve a collection of resources.
  rpc ListResources(.method_async.v1.ListResourcesRequest)
      returns (.method_async.v1.ListResourcesResponse) {
    option (.google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*}/resources"
    };
    option (.google.api.method_signature) = "parent";
  }

  // Retrieve a single resource.
  rpc GetResource(.method_async.v1.GetResourceRequest)
      returns (.method_async.v1.Resource) {
    option (.google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/resources/*}"
    };
    option (.google.api.method_signature) = "name";
  }

  // Create a new resource.
  rpc CreateResource(.method_async.v1.CreateResourceRequest)
      returns (.google.longrunning.Operation) {
    option (.google.api.http) = {
      post: "/v1/{parent=projects/*/locations/*}/resources",
      body: "resource"
    };
    option (.google.api.method_signature) = "parent,resource,resource_id";
    option (.google.longrunning.operation_info) = {
      response_type: "Resource",
      metadata_type: "OperationMetadata"
    };
  }

  // Update a single resource.
  rpc UpdateResource(.method_async.v1.UpdateResourceRequest)
      returns (.google.longrunning.Operation) {
    option (.google.api.http) = {
      patch: "/v1/{resource.name=projects/*/locations/*/resources/*}",
      body: "resource"
    };
    option (.google.api.method_signature) = "resource,update_mask";
    option (.google.longrunning.operation_info) = {
      response_type: "Resource",
      metadata_type: "OperationMetadata"
    };
  }

  // Delete a single resource.
  rpc DeleteResource(.method_async.v1.DeleteResourceRequest)
      returns (.google.longrunning.Operation) {
    option (.google.api.http) = {
      delete: "/v1/{name=projects/*/locations/*/resources/*}"
    };
    option (.google.api.method_signature) = "name";
    option (.google.longrunning.operation_info) = {
      response_type: "google.protobuf.Empty",
      metadata_type: "OperationMetadata"
    };
  }
}
