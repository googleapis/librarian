syntax = "proto3";

package multi_service.v1;

import "experimental/users/santiquiroga/librarian/test_env/multi_service/v1/multi_service_resources.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

service SecondService {
  option (google.api.default_host) = "multiservice.googleapis.com";

  // Get shared resource.
  rpc GetResource(GetResourceRequest) returns (Resource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/resources/*}"
    };
  }

  // Get resource two.
  rpc GetSecondResource(GetSecondResourceRequest) returns (SecondResource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/seconds/*/resources/*}"
    };
  }
}

message GetResourceRequest {
  // The name of the resource.
  optional string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "multiservice.googleapis.com/Resource"
    }
  ];
}

message GetSecondResourceRequest {
  // The name of the resource.
  optional string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "multiservice.googleapis.com/SecondResource"
    }
  ];
}
