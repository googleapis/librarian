syntax = "proto3";

package multi_service.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";

// Resource message shared between multiple service interfaces.
// (-- This example is somewhat contrived since the CreateResource method
// belongs to FirstService, whereas GetResource belongs to SecondService,
// but the idea is to include a resource referenced in more than one service,
// since resources are not tied to any particular service and thus the
// service:resource mapping is not one-to-many. In practice this is more likely
// to come up for custom methods in different services that reference the same
// resource. --)
message Resource {
  option (google.api.resource) = {
    type: "multiservice.googleapis.com/Resource",
    pattern: "projects/{project}/locations/{location}/resources/{resource}"
    singular: "resource"
    plural: "resources"
  };

  // Resource name.
  optional string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Shared resource field.
  optional string shared_resource_field = 2;
}

message FirstResource {
  option (google.api.resource) = {
    type: "multiservice.googleapis.com/FirstResource",
    pattern: "projects/{project}/locations/{location}/firsts/{first}/resources/{resource}"
    singular: "firstResource"
    plural: "firstResources"
  };

  // Resource name.
  optional string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Resource one field.
  optional string resource_one_field = 2;
}

message SecondResource {
  option (google.api.resource) = {
    type: "multiservice.googleapis.com/SecondResource",
    pattern: "projects/{project}/locations/{location}/seconds/{second}/resources/{resource}"
    singular: "secondResource"
    plural: "secondResources"
  };

  // Resource name.
  optional string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Resource two field.
  optional string resource_two_field = 2;
}
