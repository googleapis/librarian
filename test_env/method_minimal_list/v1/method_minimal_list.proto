syntax = "proto3";

package method_minimal_list.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

message Resource {
  option (.google.api.resource) = {
    type: "example.googleapis.com/Resource",
    pattern: "projects/{project}/locations/{location}/resources/{resource}"
  };

  // Resource name.
  optional string name = 1 [(.google.api.field_behavior) = IDENTIFIER];

  // The labels on the resource, which can be used for categorization.
  // similar to Kubernetes resource labels.
  map<string, string> labels = 2;

  // The unique identifier of the resource. UID is unique in the time
  // and space for this resource within the scope of the service. It is
  // typically generated by the server on successful creation of a resource
  // and must not be changed. UID is used to uniquely identify resources
  // with resource name reuses. This should be a UUID4.
  optional string uid = 3 [(.google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. An opaque value that uniquely identifies a version or
  // generation of a resource. It can be used to confirm that the client
  // and server agree on the ordering of a resource being written.
  optional string etag = 4 [(.google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was created.
  optional .google.protobuf.Timestamp create_time = 5
      [(.google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was last updated. Any
  // change to the resource made by users must refresh this value.
  // Changes to a resource made by the service should refresh this value.
  optional .google.protobuf.Timestamp update_time = 6
      [(.google.api.field_behavior) = OUTPUT_ONLY];
}

// The request structure for the ListResources method.
message ListResourcesRequest {
  // The parent of the resource.
  optional string parent = 1 [
    (.google.api.field_behavior) = REQUIRED,
    (.google.api.resource_reference) = {
      child_type: "example.googleapis.com/Resource"
    }
  ];

  // The maximum number of resources to send per page.
  optional int32 page_size = 2;

  // The page token: If the next_page_token from a previous response
  // is provided, this request will send the subsequent page.
  optional string page_token = 3;
}

// The response structure for the ListResources method.
message ListResourcesResponse {
  // The resulting resources.
  repeated .method_minimal_list.v1.Resource resources = 1;

  // If present, the next page token can be provided to a subsequent
  // ListResources call to list the next page.
  // If empty, there are no more pages.
  optional string next_page_token = 2;
}

// The request structure for the GetResource method.
message GetResourceRequest {
  // The resource name of the resource within a service.
  optional string name = 1 [
    (.google.api.field_behavior) = REQUIRED,
    (.google.api.resource_reference) = {
      type: "example.googleapis.com/Resource"
    }
  ];
}

service MethodMinimalList {
  option (google.api.default_host) = "methodminimallist.googleapis.com";

  // Retrieve a collection of resources.
  rpc ListResources(.method_minimal_list.v1.ListResourcesRequest)
      returns (.method_minimal_list.v1.ListResourcesResponse) {
    option (.google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*}/resources"
    };
    option (.google.api.method_signature) = "parent";
  }

  // Retrieve a single resource.
  rpc GetResource(.method_minimal_list.v1.GetResourceRequest)
      returns (.method_minimal_list.v1.Resource) {
    option (.google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/resources/*}"
    };
    option (.google.api.method_signature) = "name";
  }
}
