service ResourceStandard {
  // Retrieve a collection of resources.
  rpc ListResources(.resource_standard.v1.ListResourcesRequest)
      returns (.resource_standard.v1.ListResourcesResponse) {
    option (.google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*}/resources"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/Resource"
    };
    option (.google.api.method_signature) = "parent";
  }

  // Retrieve a single resource.
  rpc GetResource(.resource_standard.v1.GetResourceRequest)
      returns (.resource_standard.v1.Resource) {
    option (.google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/resources/*}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/Resource"
    };
    option (.google.api.method_signature) = "name";
  }

  // Lists Zones in a given project and location.
  rpc ListZones(.resource_standard.v1.ListZonesRequest)
      returns (.resource_standard.v1.ListZonesResponse) {
    option (.google.api.http) = {
      get: "/v1/{parent=projects/*}/zones"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/Zone"
    };
    option (.google.api.method_signature) = "parent";
  }

  // Gets details of a single Zone.
  rpc GetZone(GetZoneRequest) returns (Zone) {
    option (google.api.method_signature) = "name";
    option (google.api.http) = {
      get: "/v1/{name=projects/*/zones/*}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/Zone"
    };
    option (google.api.method_signature) = "name";
  }

  // Retrieve a single zone resource.
  rpc GetZoneResource(.resource_standard.v1.GetZoneResourceRequest)
      returns (.resource_standard.v1.ZoneResource) {
    option (.google.api.http) = {
      get: "/v1/{name=projects/*/zones/*/zoneResources/*}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/ZoneResource"
    };
    option (.google.api.method_signature) = "name";
  }

  // Retrieve a single region resource.
  rpc GetRegionResource(.resource_standard.v1.GetRegionResourceRequest)
      returns (.resource_standard.v1.RegionResource) {
    option (.google.api.http) = {
      get: "/v1/{name=projects/*/regions/*/regionResources/*}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/RegionResource"
    };
    option (.google.api.method_signature) = "name";
  }

  // Retrieve a single resource.
  rpc GetSingletonResource(.resource_standard.v1.GetSingletonResourceRequest)
      returns (.resource_standard.v1.SingletonResource) {
    option (.google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/singletonResources}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/SingletonResource"
    };
    option (.google.api.method_signature) = "name";
  }

  // Retrieve a single resource.
  rpc GetGlobalResource(.resource_standard.v1.GetGlobalResourceRequest)
      returns (.resource_standard.v1.GlobalResource) {
    option (.google.api.http) = {
      get: "/v1/{name=projects/*/parents/*/global/globalResources/*}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/GlobalResource"
    };
    option (.google.api.method_signature) = "name";
  }

  // Create a new resource.
  rpc CreateResource(.resource_standard.v1.CreateResourceRequest)
      returns (.resource_standard.v1.Resource) {
    option (.google.api.http) = {
      post: "/v1/{parent=projects/*/locations/*}/resources",
      body: "resource"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/Resource"
    };
    option (.google.api.method_signature) = "parent,resource,resource_id";
  }

  // Update a single resource.
  rpc UpdateResource(.resource_standard.v1.UpdateResourceRequest)
      returns (.resource_standard.v1.Resource) {
    option (.google.api.http) = {
      patch: "/v1/{resource.name=projects/*/locations/*/resources/*}",
      body: "resource"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/Resource"
    };
    option (.google.api.method_signature) = "resource,update_mask";
  }

  // Delete a single resource.
  rpc DeleteResource(.resource_standard.v1.DeleteResourceRequest)
      returns (.google.protobuf.Empty) {
    option (.google.api.http) = {
      delete: "/v1/{name=projects/*/locations/*/resources/*}"
    };
    option (.google.api.method_resource) = {
      type: "example.googleapis.com/Resource"
    };
    option (.google.api.method_signature) = "name";
  }
}
