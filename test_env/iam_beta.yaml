                    view into security policy across your entire organization, with built-in
                    auditing to ease compliance processes.

                    More information on Cloud IAM can be found here:
                    https://cloud.google.com/iam and detailed documentation can be found here:
                    https://cloud.google.com/iam/docs/
        method_rules:
            - selector: google.iam.v3beta.PrincipalAccessBoundaryPolicies.GetPrincipalAccessBoundaryPolicy
              help_text:
                brief: Get PrincipalAccessBoundaryPolicy instance.
                description: | # Provide additional Content and context for the command here.
                    Get PrincipalAccessBoundaryPolicy instance.
                examples:
                    - |-
                      To get the details of a single policy `my-policy` in organization `123`, run:

                      $ {command} my-policy --organization=123 --location=global
            - selector: google.iam.v3beta.PrincipalAccessBoundaryPolicies.ListPrincipalAccessBoundaryPolicies
              help_text:
                brief: List PrincipalAccessBoundaryPolicy instances.
                description: | # Provide additional Content and context for the command here.
                    List PrincipalAccessBoundaryPolicy instances.
                examples:
                    - |-
                      To list all policy instances in organization `123`, run:

                      $ {command} --organization=123 --location=global
            - selector: google.iam.v3beta.PrincipalAccessBoundaryPolicies.CreatePrincipalAccessBoundaryPolicy
              help_text:
                brief: Create PrincipalAccessBoundaryPolicy instance.
                description: | # Provide additional Content and context for the command here.
                    Create PrincipalAccessBoundaryPolicy instance.
                examples:
                    - |-
                      To create a policy instance called `my-policy`, run:

                      $ {command} my-policy --organization=123 --location=global
            - selector: google.iam.v3beta.PrincipalAccessBoundaryPolicies.UpdatePrincipalAccessBoundaryPolicy
              help_text:
                brief: Update PrincipalAccessBoundaryPolicy instance.
                description: | # Provide additional Content and context for the command here.
                    Update PrincipalAccessBoundaryPolicy instance.
                examples:
                    - |-
                      To update display name of `my-policy` in organization `123`, run:

                      $ {command} my-policy --organization=123 --location=global --display-name=new-display-name
            - selector: google.iam.v3beta.PrincipalAccessBoundaryPolicies.DeletePrincipalAccessBoundaryPolicy
              help_text:
                brief: Delete PrincipalAccessBoundaryPolicy instance.
