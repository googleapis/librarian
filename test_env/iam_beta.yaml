                examples:
                    - |-
                      To delete `my-policy` instance in organization `123`, run:

                      $ {command} my-policy --organization=123 --location=global
            - selector: google.iam.v3beta.PrincipalAccessBoundaryPolicies.SearchPrincipalAccessBoundaryPolicyBindings
              help_text:
                brief: Search Principal Access Boundary Policy Bindings.
                description: | # Provide additional Content and context for the command here.
                    Search all policy bindings that bind a specific policy if a user has searchPolicyBindings permission on that policy.
                examples:
                    - |-
                      To search policy bindings associated with Principal Access Boundary Policy, run:

                      $ {command} my-policy --organization=123 --location=global
        message_rules:
            - selector: google.iam.v3beta.PrincipalAccessBoundaryPolicy
              help_text:
                brief: Manage PrincipalAccessBoundaryPolicy instances.
                description: |- # Provide additional Content and context for the command here.
                    Manage PrincipalAccessBoundaryPolicy instances.
      output_formatting:
        - selector: google.iam.v3beta.PrincipalAccessBoundaryPolicies.ListPrincipalAccessBoundaryPolicies
          format: |-
            table(name,
                  uid,
                  etag,
                  displayName,
                  annotations,
                  createTime,
                  updateTime,
                  state,
                  details.rules:label=rules)
