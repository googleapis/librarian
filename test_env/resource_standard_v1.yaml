service_info:
  title: Standard Resource API
  default_host: resourcestandard.googleapis.com
  package: resource_standard.v1
  version: v1
  release_tracks: [GA]
proto_info:
  proto_library_path: resource_standard/v1
  proto_files:
   - standard_resource.proto
gcloud_info:
  temp_cli_tree_override: resource-standard
  help_text:
    brief: Manage Standard Resource API resources.
    description: Manage Standard Resource API resources.
resource_info:  # Added resource_info block
  resources:
    # projects.locations.resources
    projects.locations.resources:
      proto_message: Resource
      gcloud_resources:
      - args:
        - arg_name: resource  # from pattern
          is_parent_resource: false
          resource_id_spec: true
        - arg_name: location  # from pattern
          is_parent_resource: true
        - arg_name: project   # from pattern
          is_parent_resource: true
    # projects.zones
    projects.zones:
      proto_message: Zone
      gcloud_resources:
      - args:
        - arg_name: zone
          is_parent_resource: false
          resource_id_spec: true
        - arg_name: project
          is_parent_resource: true
    # projects.zones.zoneResources
    projects.zones.zoneResources:
      proto_message: ZoneResource
      gcloud_resources:
      - args:
        - arg_name: zoneResource
          is_parent_resource: false
          resource_id_spec: true
        - arg_name: zone
          is_parent_resource: true
        - arg_name: project
          is_parent_resource: true
    # projects.regions.regionResources
    projects.regions.regionResources:
      proto_message: RegionResource
      gcloud_resources:
      - args:
        - arg_name: regionResource
          is_parent_resource: false
          resource_id_spec: true
        - arg_name: region
          is_parent_resource: true
        - arg_name: project
          is_parent_resource: true
  command_overrides:
    # Example: Override help text for a specific command if needed
    # "resources.list":
    #  help_text:
    #    brief: List Standard Resources.
