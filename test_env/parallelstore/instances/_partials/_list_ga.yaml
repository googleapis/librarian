- release_tracks:
    - GA
  auto_generated: true
  hidden: true
  help_text:
    brief: List Parallelstore instances
    description: |
      List Parallelstore instances.
    examples: |-
      To list all instances in particular location `us-central1-a` run:

      $ {command} --location=us-central1-a
  arguments:
    params:
      - help_text: The project and location for which to retrieve locations information.
        is_positional: false
        is_primary_resource: true
        resource_spec:
          name: location
          plural_name: locations
          collection: parallelstore.projects.locations
          attributes:
            - parameter_name: projectsId
              attribute_name: project
              help: The project id of the {resource} resource.
              property: core/project
            - parameter_name: locationsId
              attribute_name: location
              help: The location id of the {resource} resource.
          disable_auto_completers: false
        required: true
        repeated: false
  request:
    api_version: v1
    collection: parallelstore.projects.locations.instances
  response:
    id_field: name
  output:
    format: |-
      table(
      name,
      description,
      state,
      createTime,
      updateTime,
      capacityGib,
      daosVersion,
      accessPoints.join(','),
      network,
      reservedIpRange,
      effectiveReservedIpRange,
      fileStripeLevel,
      directoryStripeLevel,
      deploymentType)
